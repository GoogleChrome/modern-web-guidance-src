<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Tooltip Example</title>
  <style>
    .my-trigger {
      anchor-name: --my-trigger;
      margin: 100px;
      padding: 10px 20px;
    }

    #my-popover {
      /* Tooltip styles */
      background: #333;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.875rem;
      border: none;

      /* Positioning */
      position-anchor: --my-trigger;
      position-area: top;
      /* try top center first */
      margin-inline: auto;

      /* Fallbacks if top is clipped */
      position-try-fallbacks: flip-block;

      /* Animation */
      opacity: 0;
      transition: opacity 0.2s, display 0.2s allow-discrete;
    }

    #my-popover:popover-open {
      opacity: 1;
    }

    @starting-style {
      #my-popover:popover-open {
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- 
  interestfor connects the button to the popover for hover/focus behavior (hovercard/tooltip)
-->
  <button class="my-trigger" interestfor="my-popover">
    Hover me
  </button>

  <div id="my-popover" popover="hint">
    This is a modern tooltip!
  </div>

  <script>
    (async () => {
      const polyfills = [];

      // 1. Popover API
      if (!HTMLElement.prototype.hasOwnProperty("popover")) {
        console.log("Polyfilling Popover API...");
        polyfills.push(
          import("https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js")
        );
      }

      // 2. Anchor Positioning
      if (!("positionAnchor" in document.documentElement.style)) {
        console.log("Polyfilling Anchor Positioning...");
        polyfills.push(
          import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js")
        );
      }

      // 3. Interest Invokers
      if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
        console.log("Polyfilling Interest Invokers...");
        polyfills.push(
          import("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js")
        );
      }

      try {
        await Promise.all(polyfills);
        if (polyfills.length > 0) {
          console.log("All requested polyfills loaded successfully.");
        } else {
          console.log("All features supported natively!");
        }
      } catch (e) {
        console.error("Error loading polyfills:", e);
      }
    })();
  </script>

</body>

</html>
