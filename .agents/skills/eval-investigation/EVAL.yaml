suite_name: investigating-eval-results
timeout_seconds: 300
max_tool_calls: 50

cases:
  - name: data_access_gcs
    prompt: >
      I need to debug a failed eval run. How do I get the evals.json for suite 'full-2026-03-10-gcli'?
    skills: [investigating-eval-results]
    rubric: |
      The agent must:
      - Provide the gcloud storage cp command
      - Use the correct GCS path gs://guidance-evals/full-2026-03-10-gcli/evals.json
    expect_keywords_any:
      - "gcloud storage cp"
      - "gs://guidance-evals/"
      - "evals.json"

  - name: troubleshooting_mcp_discovery
    prompt: >
      The eval results show 'guideUsed: false' for GCLI, and mcp-server.log is missing. What's the likely cause?
    skills: [investigating-eval-results]
    rubric: |
      The agent must:
      - Mention GCLI folder trust checks as a likely cause
      - Suggest checking stderr for "Skipping MCP discovery"
      - Point to security.folderTrust.enabled in settings.json
    expect_keywords_any:
      - "trust"
      - "stderr"
      - "folderTrust"
      - "settings.json"

  - name: pattern_analysis_target_file
    prompt: >
      The agent implemented the feature correctly in a new file, but the grader failed because it couldn't find the element. How do I fix the task?
    skills: [investigating-eval-results]
    rubric: |
      The agent must:
      - Identify the "Salient changes in new files" pattern
      - Suggest updating the task frontmatter with the target_file attribute
    expect_keywords_any:
      - "target_file"
      - "frontmatter"
      - "check"
