<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Infinite Scroll Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            background: #333;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
        }

        .item {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            /* content-visibility: auto can be useful here if we have many items off-screen,
               but we are controlling the DOM size now, so it's less critical but still good practice.
               contain-intrinsic-size is needed to prevent scrollbar jumping. */
            content-visibility: auto;
            contain-intrinsic-size: 100px; 
        }

        .item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #eee;
        }

        .tag {
            display: inline-block;
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
            margin-right: 5px;
        }

        #sentinel {
            height: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
      <h1>Optimized Page</h1>
      <p>This page uses infinite scrolling to load items on demand.</p>
    </div>

    <div id="container">
        <!-- Content generated by JS -->
    </div>
    <div id="sentinel"></div>

    <script>
        const container = document.getElementById('container');
        const sentinel = document.getElementById('sentinel');
        
        let currentItemCount = 0;
        const totalItems = 1000;
        const itemsPerBatch = 20;
        
        function createItem(index) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <img src="https://picsum.photos/seed/${index}/80/80" alt="Random Image ${index}" loading="lazy">
                <div>
                    <h3>Item ${index}</h3>
                    <p>Some optimized content here...</p>
                    <span class="tag">tag1</span>
                    <span class="tag">tag2</span>
                </div>
            `;
            return div;
        }
        
        function loadMoreItems() {
            if (currentItemCount >= totalItems) {
                sentinel.textContent = "No more items";
                observer.disconnect();
                return;
            }

            const fragment = document.createDocumentFragment();
            const limit = Math.min(currentItemCount + itemsPerBatch, totalItems);

            for (let i = currentItemCount; i < limit; i++) {
                fragment.appendChild(createItem(i));
            }
            
            container.appendChild(fragment);
            currentItemCount = limit;
        }

        // Intersection Observer for Infinite Scroll
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadMoreItems();
            }
        }, {
            root: null,
            rootMargin: '100px', // Load slightly before reaching the bottom
            threshold: 0.1
        });

        // Initial load
        loadMoreItems();
        
        // Start observing
        observer.observe(sentinel);

    </script>
</body>
</html>
