<!DOCTYPE html>
<html>
<!-- MISSING: viewport meta tag -->

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Pattern Demo</title>
    <!-- BAD: Inline styles for everything -->
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            background: #333;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
        }

        .item {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            content-visibility: auto;
            contain-intrinsic-size: auto 100px; /* Estimated height based on content */
        }

        .tag {
            display: inline-block;
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .hidden-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="header">
      <h1>Welcome to the Laggy Page</h1>
      <p>This page violates every rule in the guide.</p>
    </div>

    <div class="hidden-menu">
      <ul>
        <li><a href="#">Hidden Item 1</a></li>
        <li><a href="#">Hidden Item 2</a></li>
      </ul>
    </div>
<div id="container">
  <!-- Content generated by JS -->
    </div>

    <script>
        const container = document.getElementById('container');
        let itemIndex = 0;
        const totalItems = 1000;
        const batchSize = 20;

        function createItem(index) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <h3>Item ${index}</h3>
                <img src="https://picsum.photos/seed/${index}/600/300" alt="Placeholder ${index}" style="width:100%; height:auto; display:block; margin-bottom:10px;" loading="lazy">
                <p>Some content for item ${index}...</p>
                <span class="tag">tag1</span>
                <span class="tag">tag2</span>
            `;
            return div;
        }

        function loadItems() {
            const fragment = document.createDocumentFragment();
            const limit = Math.min(itemIndex + batchSize, totalItems);

            for (let i = itemIndex; i < limit; i++) {
                fragment.appendChild(createItem(i));
            }

            container.appendChild(fragment);
            itemIndex = limit;
        }

        // Initial load
        loadItems();

        // Sentinel for infinite scroll
        const sentinel = document.createElement('div');
        container.appendChild(sentinel);

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && itemIndex < totalItems) {
                loadItems();
                // Move sentinel to the end
                container.appendChild(sentinel);
            } else if (itemIndex >= totalItems) {
                observer.disconnect();
                sentinel.textContent = "All items loaded";
                sentinel.style.textAlign = "center";
                sentinel.style.padding = "20px";
            }
        }, {
            rootMargin: '400px' // Load more before reaching the bottom
        });

        observer.observe(sentinel);
    </script>
</body>
</html>
