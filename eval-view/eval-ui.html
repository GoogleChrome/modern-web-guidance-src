<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Eval Runner</title>
    <link rel="stylesheet" href="eval-ui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap">
</head>
<body>
    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="dashboard-container">
        <header class="fancy-header">
            <div class="header-text">
                <div class="logo">Guidance <span>Eval Runner</span></div>
                <p>Set configurations, interactively select tasks, and run an evaluation.</p>
            </div>
            <button type="submit" class="btn-primary" id="launch-btn-header" form="launch-form">
                <span>Start Evaluation</span>
                <svg class="run-icon" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </header>

        <form id="launch-form">
            <section class="config-grid">
                <div class="glass-panel">
                    <h3>Suite Configuration</h3>
                    <div class="input-group">
                        <label for="name">Suite Name (Optional)</label>
                        <input type="text" id="name" placeholder="Leave empty for auto-generated name">
                    </div>
                    <div class="row">
                        <div class="input-group">
                            <label for="numRuns">Number of Runs</label>
                            <input type="number" id="numRuns" value="1" min="1">
                        </div>
                        <div class="input-group">
                            <label>Agent</label>
                            <div class="btn-toggle-group" id="agent-group">
                                <button type="button" class="btn-toggle active" data-value="gemini_cli">Gemini CLI</button>
                                <button type="button" class="btn-toggle" data-value="jetski">Jetski</button>
                                <button type="button" class="btn-toggle" data-value="claude_code">Claude Code</button>
                                <button type="button" class="btn-toggle" data-value="codex_cli">Codex CLI</button>
                            </div>
                            <input type="hidden" id="agent" value="gemini_cli">
                        </div>
                        <div class="input-group">
                            <label>Serving</label>
                            <div class="btn-toggle-group" id="serving-group">
                                <button type="button" class="btn-toggle active" data-value="skills_cli">Skills (CLI)</button>
                                <button type="button" class="btn-toggle" data-value="skills">Skills</button>
                                <button type="button" class="btn-toggle" data-value="mcp">MCP</button>
                            </div>
                            <input type="hidden" id="serving" value="skills_cli">
                        </div>
                    </div>
                </div>
            </section>

            <section class="tasks-section">
                <div class="panel-header">
                        <h3>Task Selector</h3>
                        <div class="quick-actions">
                            <button type="button" class="btn-secondary" id="action-clear">Clear All</button>
                        </div>
                </div>

                    <div class="table-container">
                        <table id="tasks-table">
                            <thead>
                                <tr id="table-headers">
                                    <th>Guide</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Grouped tasks go here dynamically via eval-ui.js -->
                            </tbody>
                        </table>
                </div>
            </section>

            <div class="footer-actions">
                <button type="submit" class="btn-primary" id="launch-btn">
                    <span>Start Evaluation</span>
                    <svg class="run-icon" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <script src="eval-ui.js"></script>
</body>
</html>
