name: Fix Project Status (one-off)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: number
      status:
        description: 'Status to set'
        required: true
        type: choice
        options:
          - Needs guidance
          - Needs evals
          - Complete

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Set project status
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issueNumber = parseInt('${{ inputs.issue_number }}');
            const statusName = '${{ inputs.status }}';
            const org = 'GoogleChrome';
            const projectNumber = 30;

            // Get project details
            const projectQuery = `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const projectData = await github.graphql(projectQuery, { org, number: projectNumber });
            const project = projectData.organization.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            if (!statusField) throw new Error('Status field not found');
            const option = statusField.options.find(o => o.name === statusName);
            if (!option) throw new Error(`Status option "${statusName}" not found`);

            console.log(`Project ID: ${project.id}`);
            console.log(`Status field ID: ${statusField.id}`);
            console.log(`Option ID for "${statusName}": ${option.id}`);

            // Get the issue's node ID and find its project item
            const issueData = await github.rest.issues.get({
              owner: org,
              repo: 'chrome.dev',
              issue_number: issueNumber
            });
            const issueNodeId = issueData.data.node_id;
            console.log(`Issue node ID: ${issueNodeId}`);

            // Add issue to project (no-op if already there, returns item ID)
            const addMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `;
            const addResult = await github.graphql(addMutation, {
              projectId: project.id,
              contentId: issueNodeId
            });
            const itemId = addResult.addProjectV2ItemById.item.id;
            console.log(`Project item ID: ${itemId}`);

            // Set the status
            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `;
            await github.graphql(updateMutation, {
              projectId: project.id,
              itemId,
              fieldId: statusField.id,
              optionId: option.id
            });
            console.log(`✅ Set issue #${issueNumber} project status to "${statusName}"`);
