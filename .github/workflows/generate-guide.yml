name: Generate Guide

# Triggered manually to generate a full guide package from a web-feature-id,
# or automatically on guidance-bot/* branches to re-run affected pipeline stages
# when an SME edits files in the PR.

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: 'web-features ID (e.g., intl-duration-format)'
        required: true
        type: string
      reviewer:
        description: 'GitHub username to assign as PR reviewer'
        required: true
        type: string
      category:
        description: 'Guide category (performance, user-experience, accessibility, security)'
        required: false
        default: 'user-experience'
        type: string
      slug:
        description: 'Guide directory name (defaults to feature_id)'
        required: false
        type: string

  push:
    branches:
      - 'guidance-bot/**'
    paths:
      - 'guides/**/guide.md'
      - 'guides/**/expectations.md'
      - 'guides/**/demo.html'

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Gemini CLI picks up GEMINI_API_KEY for non-OAuth auth in CI
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}

jobs:
  # ── Manual trigger: generate a brand-new guide package ──────────────────────
  generate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run setup:playwright

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Generate guide package (guide.md, demo.html, expectations.md)
        run: |
          node --experimental-strip-types guides/guide-gen.ts \
            ${{ inputs.feature_id }} \
            --category ${{ inputs.category }} \
            ${{ inputs.slug && format('--slug {0}', inputs.slug) || '' }}

      - name: Run gd dev (negative, grader, calibration, prompts, task)
        run: |
          GUIDE_SLUG="${{ inputs.slug || inputs.feature_id }}"
          node ./bin/gd.ts dev guides/${{ inputs.category }}/${GUIDE_SLUG} --no-test

      - name: Configure git
        run: |
          git config user.name "guidance-bot[bot]"
          git config user.email "guidance-bot[bot]@users.noreply.github.com"

      - name: Commit, push branch, and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          GUIDE_SLUG="${{ inputs.slug || inputs.feature_id }}"
          BRANCH="guidance-bot/${{ inputs.feature_id }}"

          git checkout -b "${BRANCH}"
          git add guides/ harness/tasks/
          git commit -m "Generate guide package for ${{ inputs.feature_id }}"
          git push -u origin "${BRANCH}"

          gh pr create \
            --title "Guide: ${{ inputs.feature_id }}" \
            --body "$(cat <<'EOF'
          ## Auto-generated guide package

          Please review the following files for correctness:

          | File | Review focus |
          |---|---|
          | \`guide.md\` | Is this technically accurate? Are the DOs/DON'Ts right? |
          | \`demo.html\` | Is this a correct implementation? |
          | \`expectations.md\` | Are we checking the right things? |
          | \`prompts.md\` | Are these realistic developer scenarios? |

          Files collapsed in this diff (auto-generated, reviewed by infra if needed):
          \`grader.ts\`, \`negative-demo.html\`, task file

          ---
          🤖 Generated by [generate-guide workflow](/.github/workflows/generate-guide.yml)
          EOF
          )" \
            --reviewer "${{ inputs.reviewer }}" \
            --base main
        shell: bash

  # ── SME feedback: re-run affected pipeline stages on guidance-bot/* branches ─
  regen-on-sme-edit:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/guidance-bot/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so we can diff against the previous commit
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run setup:playwright

      - name: Detect changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "files=${CHANGED}" >> $GITHUB_OUTPUT

          # Determine which stages need re-running
          GUIDE_CHANGED=false
          EXPECTATIONS_CHANGED=false
          DEMO_CHANGED=false

          echo "${CHANGED}" | grep -q 'guide\.md$'        && GUIDE_CHANGED=true        || true
          echo "${CHANGED}" | grep -q 'expectations\.md$' && EXPECTATIONS_CHANGED=true  || true
          echo "${CHANGED}" | grep -q 'demo\.html$'       && DEMO_CHANGED=true          || true

          echo "guide_changed=${GUIDE_CHANGED}"               >> $GITHUB_OUTPUT
          echo "expectations_changed=${EXPECTATIONS_CHANGED}" >> $GITHUB_OUTPUT
          echo "demo_changed=${DEMO_CHANGED}"                 >> $GITHUB_OUTPUT

          # Find the affected guide directory from changed paths
          GUIDE_DIR=$(echo "${CHANGED}" | grep -E 'guides/.+/(guide|expectations|demo)' | head -1 | xargs -I{} dirname {})
          echo "guide_dir=${GUIDE_DIR}" >> $GITHUB_OUTPUT

      - name: Re-run gd dev (guide.md or expectations.md changed)
        if: steps.changed.outputs.guide_changed == 'true' || steps.changed.outputs.expectations_changed == 'true'
        run: |
          node ./bin/gd.ts dev ${{ steps.changed.outputs.guide_dir }} --no-test

      - name: Re-run calibration only (demo.html changed, nothing else)
        if: |
          steps.changed.outputs.demo_changed == 'true' &&
          steps.changed.outputs.guide_changed == 'false' &&
          steps.changed.outputs.expectations_changed == 'false'
        run: |
          node ./bin/gd.ts dev ${{ steps.changed.outputs.guide_dir }} --test-grader

      - name: Configure git
        run: |
          git config user.name "guidance-bot[bot]"
          git config user.email "guidance-bot[bot]@users.noreply.github.com"

      - name: Commit regenerated artifacts
        run: |
          git add guides/ harness/tasks/
          # Only commit if there are changes; skip if SME's edit didn't change any generated output
          git diff --cached --quiet || git commit -m "Regenerate artifacts after SME edits [skip ci]"
          git push
