name: Generate Guide

# ── PURIFY INSTRUCTIONS FOR MAIN ─────────────────────────────────────────────
# 1. Remove the 'push' trigger for 'pipelinev2' below.
# 2. Re-enable the 'push' trigger for 'guidance-bot/**' branches (currently commented out).
# 3. In the 'generate' job, revert FEATURE_ID, REVIEWER, etc., to use ONLY inputs:
#    e.g., FEATURE_ID="${{ inputs.feature_id }}" (remove the '|| intl-locale-info' fallback).
# 4. Remove the 'if: ... || github.ref == 'refs/heads/pipelinev2'' condition on the 'generate' job.
# ──────────────────────────────────────────────────────────────────────────────

# Triggered manually to generate a full guide package from a web-feature-id,
# or automatically on guidance-bot/* branches to re-run affected pipeline stages
# when an SME edits files in the PR.

on:
  push:
    branches:
      - 'pipelinev2'
  workflow_dispatch:
    inputs:
      feature_id:
        description: 'web-features ID (e.g., intl-duration-format)'
        required: true
        type: string
      reviewer:
        description: 'GitHub username to assign as PR reviewer'
        required: true
        type: string
      category:
        description: 'Guide category (performance, user-experience, accessibility, security)'
        required: false
        default: 'user-experience'
        type: string
      slug:
        description: 'Guide directory name (defaults to feature_id)'
        required: false
        type: string

  # SME feedback: re-run affected pipeline stages on guidance-bot/* branches
  # (Original push trigger logic kept for other branches)
  # push:
  #   branches:
  #     - 'guidance-bot/**'
  #   paths:
  #     - 'guides/**/guide.md'
  #     - 'guides/**/expectations.md'
  #     - 'guides/**/demo.html'

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Gemini CLI picks up GEMINI_API_KEY for non-OAuth auth in CI
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}

jobs:
  # ── Manual trigger or Test trigger: generate a brand-new guide package ─────
  generate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/pipelinev2')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run setup:playwright

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Generate guide package (guide.md, demo.html, expectations.md)
        run: |
          # Use inputs or defaults for testing on push
          FEATURE_ID="${{ inputs.feature_id || 'intl-locale-info' }}"
          CATEGORY="${{ inputs.category || 'user-experience' }}"
          SLUG="${{ inputs.slug }}"
          
          SLUG_ARG=""
          if [ -n "${SLUG}" ]; then SLUG_ARG="--slug ${SLUG}"; fi
          node --experimental-strip-types guides/guide-gen.ts \
            "${FEATURE_ID}" \
            --category "${CATEGORY}" \
            ${SLUG_ARG}

      - name: Configure git
        run: |
          git config user.name "chrome-devrel-infra[bot]"
          git config user.email "124898761+chrome-devrel-infra[bot]@users.noreply.github.com"

      - name: Commit, push branch, and open PR
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FEATURE_ID="${{ inputs.feature_id || 'intl-locale-info' }}"
          SLUG="${{ inputs.slug }}"
          GUIDE_SLUG="${SLUG:-$FEATURE_ID}"
          REVIEWER="${{ inputs.reviewer || 'paulirish' }}"
          BRANCH="guidance-bot/${FEATURE_ID}"

          git checkout -b "${BRANCH}"
          git add guides/ harness/tasks/
          git commit -m "Generate guide package for ${FEATURE_ID} [skip ci]"
          
          # Use App token for push so it triggers subsequent workflows
          git push "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git" "${BRANCH}" --force

          # Use default GITHUB_TOKEN for PR creation
          # TODO: Remove --draft once we are confident in full automation
          gh pr create \
            --draft \
            --head "${BRANCH}" \
            --title "Guide: ${FEATURE_ID}" \
            --body "$(cat <<'EOF'
          ## Auto-generated guide package

          Please review the following files for correctness:

          | File | Review focus |
          |---|---|
          | \`guide.md\` | Is this technically accurate? Are the DOs/DON'Ts right? |
          | \`demo.html\` | Is this a correct implementation? |
          | \`expectations.md\` | Are we checking the right things? |
          | \`prompts.md\` | Are these realistic developer scenarios? |

          Files collapsed in this diff (auto-generated, reviewed by infra if needed):
          \`grader.ts\`, \`negative-demo.html\`, task file

          ---
          🤖 Generated by [generate-guide workflow](/.github/workflows/generate-guide.yml)
          EOF
          )" \
            --reviewer "${REVIEWER}" \
            --base main
        shell: bash

  # ── SME feedback: re-run affected pipeline stages on guidance-bot/* branches ─
  regen-on-sme-edit:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/guidance-bot/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can diff against the previous commit
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run setup:playwright

      - name: Detect changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          # Determine which stages need re-running
          GUIDE_CHANGED=false
          EXPECTATIONS_CHANGED=false
          DEMO_CHANGED=false

          echo "${CHANGED}" | grep -q 'guide\.md$'        && GUIDE_CHANGED=true        || true
          echo "${CHANGED}" | grep -q 'expectations\.md$' && EXPECTATIONS_CHANGED=true  || true
          echo "${CHANGED}" | grep -q 'demo\.html$'       && DEMO_CHANGED=true          || true

          echo "guide_changed=${GUIDE_CHANGED}"               >> $GITHUB_OUTPUT
          echo "expectations_changed=${EXPECTATIONS_CHANGED}" >> $GITHUB_OUTPUT
          echo "demo_changed=${DEMO_CHANGED}"                 >> $GITHUB_OUTPUT

          # Find the affected guide directory from changed paths
          GUIDE_DIR=$(echo "${CHANGED}" | grep -E 'guides/.+/(guide|expectations|demo)' | head -1 | xargs -I{} dirname {} || true)
          echo "guide_dir=${GUIDE_DIR}" >> $GITHUB_OUTPUT

      - name: Re-run gd dev (guide.md or expectations.md changed)
        if: |
          (steps.changed.outputs.guide_changed == 'true' || steps.changed.outputs.expectations_changed == 'true') &&
          steps.changed.outputs.guide_dir != ''
        run: |
          node ./bin/gd.ts dev "${{ steps.changed.outputs.guide_dir }}" --no-test

      - name: Re-run calibration only (demo.html changed, nothing else)
        if: |
          steps.changed.outputs.demo_changed == 'true' &&
          steps.changed.outputs.guide_changed == 'false' &&
          steps.changed.outputs.expectations_changed == 'false' &&
          steps.changed.outputs.guide_dir != ''
        run: |
          node ./bin/gd.ts dev "${{ steps.changed.outputs.guide_dir }}" --test-grader

      - name: Configure git
        run: |
          git config user.name "chrome-devrel-infra[bot]"
          git config user.email "124898761+chrome-devrel-infra[bot]@users.noreply.github.com"

      - name: Commit regenerated artifacts
        run: |
          git add guides/ harness/tasks/
          # Only commit if there are changes; skip if SME's edit didn't change any generated output
          git diff --cached --quiet || git commit -m "Regenerate artifacts after SME edits [skip ci]"
          git push
