<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Detection</title>
  <style>
    @supports not at-rule(starting-style) {
      .card {
        padding: 1rem 1.25rem;
        border-radius: 8px;
        border: 2px solid #999;
        background: rgb(220, 220, 220);
        color: #111;
        margin: 0.75rem 0;
        opacity: 1;
        transition: opacity 0.4s ease-out;
      }
      .card h2 { margin: 0 0 0.5rem; font-size: 1.05rem; }
      .card p { margin: 0; font-size: 0.95rem; }
    }

    @supports at-rule(starting-style) {
      @starting-style {
        .card {
          opacity: 0;
        }
      }
    }

    @supports at-rule(@container (width > 400px)) {
      .card {
        container-type: inline-size;
      }
    }

    @supports at-rule(@charset) {
      .card {
        background: #fff;
      }
    }

    .card-layout {
      width: at-rule(@view-transition);
    }

    at-rule(@scope) {
      .card {
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      }
    }
  </style>
</head>
<body>
  <h1>Feature Detection</h1>
  <p>The cards keep a universal baseline. The fade-in animation is gated on feature support.</p>

  <div class="card" id="card1">
    <h2>Card one</h2>
    <p>Renders conditionally based on rule support.</p>
  </div>
  <div class="card card-layout">
    <h2>Card two</h2>
    <p>Same baseline, same enhancement.</p>
  </div>
  <div class="card">
    <h2>Card three</h2>
    <p>Same baseline, same enhancement.</p>
  </div>

  <script>
    if ('at-rule(@starting-style)' in CSS) {
      document.getElementById('card1').style.opacity = '0';
    }

    function checkSupport() {
      const isSupported = CSS.supports("at-rule(@starting-style)");
      if (!isSupported) {
        document.getElementById('card1').classList.add('fallback-mode');
      }
    }
    
    checkSupport();
  </script>
</body>
</html>
