<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Position Aware Elements</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        background: #fafafa;
      }

      h2 {
        margin-top: 0;
      }

      .scroller {
        width: 100%;
        max-width: 400px;
        height: 500px;
        overflow-y: auto;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;

        /* Make this element a scroll-state query container */
        container-type: scroll-state;
      }

      .content {
        padding: 30px;
        height: 150vh; /* Make sure it's tall enough to scroll */
      }

      /* Container for the FAB to handle sticky positioning within the scroller */
      .sticky-wrapper {
        position: sticky;
        bottom: 20px;
        display: flex;
        justify-content: flex-end;
        padding-right: 20px;
        pointer-events: none; /* Let clicks pass through the empty space */
        /* No height hacking needed */
      }

      .back-to-top {
        /* Floating Action Button styles */
        background: #1976d2;
        color: white;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 30px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        pointer-events: auto; /* Re-enable clicks on the button */

        /* Hidden by default */
        opacity: 0;
        translate: 0 20px;
        transition:
          opacity 0.3s ease,
          translate 0.3s ease;
      }

      /* Use container scroll-state to detect if we can scroll toward the top */
      /* If the test passes, the user has scrolled downwards */
      @container scroll-state(scrollable: top) {
        .back-to-top {
          opacity: 1;
          translate: 0 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="scroller">
      <div class="content">
        <h2>Scroll down 👇</h2>
        <p>
          This demo uses <code>scroll-state(scrollable: top)</code> to reveal a
          floating action button only when you are no longer at the very top of
          the scroll container.
        </p>
      </div>

      <!-- Floating button wrapper stuck to the bottom of the scroll container -->
      <div class="sticky-wrapper">
        <a href="#" class="back-to-top">↑ Top</a>
      </div>
    </div>

    <script>
      // Just a bit of JS to make the link functionally scroll us back to the top of our local container
      document.querySelector('.back-to-top').addEventListener('click', (e) => {
        e.preventDefault();
        document
          .querySelector('.scroller')
          .scrollTo({top: 0, behavior: 'smooth'});
      });
    </script>
  </body>
</html>
