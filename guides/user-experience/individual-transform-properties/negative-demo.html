<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Negative Demo</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #eee;
    }

    .bad-target {
      width: 100px;
      height: 100px;
      background: red;
      animation: movement 2s infinite alternate;
      /* Incorrectly using will-change for stacking context */
      will-change: transform;
    }

    .bad-target:hover {
      transform: scale(1.5);
      transition: transform 0.5s;
    }

    @keyframes movement {
      from {
        transform: translateX(-100px) rotate(0deg);
      }
      to {
        transform: translateX(100px) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="bad-target"></div>
</body>
</html>
