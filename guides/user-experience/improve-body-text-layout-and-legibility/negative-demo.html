<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typography: Standard Layout</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.5;
      max-width: 600px;
      margin: 20px;
    }
    /* Negative Demo: No text-wrap properties used */
  </style>
</head>
<body>
  <h1>Standard Wrapping</h1>
  <p>
    This is a standard paragraph that does not use any special wrapping algorithms. It will use the default greedy algorithm, 
    which might result in orphans or awkward line breaks at the end of the container. 
  </p>
</body>
</html>
