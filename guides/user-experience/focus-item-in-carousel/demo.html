<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Item In Carousel Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
    }

    h1 {
      color: #0f172a;
    }

    p {
      color: #475569;
      max-width: 600px;
      text-align: center;
      margin-bottom: 30px;
    }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 20px;
      padding: 20px;
      width: 100%;
      max-width: 800px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      /* Smooth scrolling for user interaction, but scroll-initial-target is instant */
      scroll-behavior: smooth;
    }

    .item {
      flex: 0 0 300px;
      height: 200px;
      background: #e2e8f0;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      color: #64748b;
      scroll-snap-align: center;
      transition: transform 0.2s;
    }

    .item:hover {
      transform: scale(1.02);
    }

    /* 
     * The target item we want to scroll to on initial render.
     */
    .item.target {
      scroll-initial-target: nearest;
      background: #3b82f6;
      color: white;
      position: relative;
    }

    .item.target::before {
      content: '📌 Initial Target';
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 8px;
      border-radius: 4px;
      color: white;
    }
  </style>
</head>

<body>

  <h1>Product Gallery</h1>
  <p>This carousel uses <code>scroll-initial-target: nearest</code> to automatically scroll to the third item (the main
    featured product) on initial page load.</p>

  <div class="carousel" id="gallery">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>

    <!-- The specific target item -->
    <div class="item target">Item 3 (Featured)</div>

    <div class="item">Item 4</div>
    <div class="item">Item 5</div>
  </div>

  <script>
    // Fallback strategy for browsers that don't support scroll-initial-target
    document.addEventListener("DOMContentLoaded", () => {
      const targetItem = document.querySelector('.item.target');

      if (targetItem && !CSS.supports('scroll-initial-target', 'nearest')) {
        // Fallback for browsers that don't support the CSS property
        targetItem.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
      }
    });
  </script>
</body>

</html>
