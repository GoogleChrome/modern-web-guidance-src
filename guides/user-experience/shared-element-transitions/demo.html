<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Shared Element Transitions</title>
  <style>
    /* CORE: All list items share the same transition */
    .item {
      view-transition-class: item;
    }

    /* DEMO: Styling */
    body {
      font-family: monospace;
      max-width: 400px;
      margin: 20px auto;
      padding: 0 20px;
    }

    button {
      padding: 8px 16px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      margin: 5px 0;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .item button {
      padding: 4px 10px;
      font-size: 12px;
      background: #cc3333;
    }
  </style>
</head>

<body>
  <h1>Shared Element Transitions</h1>
  <button onclick="add()">Add Item</button>
  <div id="list"></div>

  <script>
    let items = ['Apple', 'Banana', 'Carrot'];
    let id = 4;

    /* CORE: Wrap list update in view transition */
    function render() {
      if (!document.startViewTransition) {
        update();
        return;
      }
      document.startViewTransition(() => update());
    }

    /* DEMO: Update DOM */
    function update() {
      const html = items.map((item, i) => `
        <div class="item">
          <span>${item}</span>
          <button onclick="remove(${i})">Remove</button>
        </div>
      `).join('');
      document.getElementById('list').innerHTML = html;
    }

    /* DEMO: Add/Remove items */
    function add() {
      items.push(`Item ${id++}`);
      render();
    }

    function remove(i) {
      items.splice(i, 1);
      render();
    }

    update();
  </script>
</body>

</html>
