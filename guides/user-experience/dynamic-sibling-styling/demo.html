<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Sibling Styling Demo</title>
    <style>
      .dynamic-list {
        display: flex;
        gap: 10px;
        padding: 20px;
        list-style: none;
      }

      .swatch {
        height: 100px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;

        --index: var(--sibling-index);
        --count: var(--sibling-count);

        @supports (top: calc(sibling-index() * 1px)) {
          --index: sibling-index();
          --count: sibling-count();
        }

        /* Dynamic width based on total count */
        width: calc(100% / var(--count));

        /* Dynamic color based on position in the list */
        background-color: hsl(
          calc(360deg / var(--count) * var(--index)),
          70%,
          50%
        );

        /* Symmetrical scale effect */
        --center: calc((var(--count) + 1) / 2);
        --dist-from-center: calc(var(--index) - var(--center));
        /* Items closer to the edges are slightly smaller */
        transform: scale(calc(1 - (abs(var(--dist-from-center)) * 0.1)));
      }
    </style>
  </head>
  <body>
    <h1>Dynamic Sibling Styling</h1>
    <ul class="dynamic-list">
      <li class="swatch">1</li>
      <li class="swatch">2</li>
      <li class="swatch">3</li>
      <li class="swatch">4</li>
      <li class="swatch">5</li>
    </ul>

    <script type="module">
      if (!CSS.supports("top: calc(sibling-index() * 1px)")) {
        const container = document.querySelector(".dynamic-list");
        const items = [...container.children];
        const count = items.length;

        items.forEach((item, index) => {
          item.style.setProperty("--sibling-index", index + 1);
          item.style.setProperty("--sibling-count", count);
        });
      }
    </script>
  </body>
</html>
