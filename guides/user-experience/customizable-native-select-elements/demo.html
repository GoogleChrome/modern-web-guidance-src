<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customizable Native Select</title>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f6f8fa;
    }

    .wrapper {
      padding: 2rem;
    }

    /* 
      Base styles (Fallback for older browsers).
      It remains a standard OS-level dropdown where these advanced rules are ignored. 
    */
    .custom-select {
      padding: 8px 12px;
      font-size: 16px;
      color: #24292f;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      background-color: #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      width: 250px;
    }

    .custom-select option {
      padding: 4px;
    }

    /* 
      Progressive enhancement: Wrap the new styling entirely within 
      an @supports block targeting appearance: base-select 
    */
    @supports (appearance: base-select) {

      /* Tell the browser we want to control the select's inner shadow DOM */
      .custom-select {
        appearance: base-select;
        anchor-name: --select-anchor;
        cursor: pointer;
        transition: outline 0.2s;
      }

      .custom-select:focus-visible {
        outline: 2px solid #0969da;
        outline-offset: 2px;
      }

      /* 
        The ::selectedcontent pseudo-element targets the collapsed state 
        showing the currently actively selected option 
      */
      .custom-select::selectedcontent {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 500;
      }

      /* 
        The ::picker(select) pseudo-element controls the dropdown surface 
        (which natively sits in the top-layer) 
      */
      .custom-select::picker(select) {
        appearance: base-select;
        /* Tethering via Anchor Positioning */
        position-anchor: --select-anchor;
        position-area: bottom span-right;
        position-try-fallbacks: flip-block;

        margin: 4px 0 0 0;
        padding: 6px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background-color: #ffffff;
        box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);

        /* Match the width of the trigger button */
        width: anchor-size(width);
      }

      /* Styling the native <option> elements inside the top-layer picker */
      .custom-select option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 4px;
        margin-bottom: 2px;
        cursor: pointer;
      }

      .custom-select option:last-child {
        margin-bottom: 0px;
      }

      .custom-select option:hover,
      .custom-select option:focus-visible {
        background-color: #f3f4f6;
        outline: none;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <select class="custom-select" aria-label="Select a country" name="country" autocomplete="country">
      <!-- 
        Rich HTML injected inside options. Natively, old browsers discard the child tags, 
        just displaying the text content. Browsers with base-select will render the rich HTML. 
      -->
      <option value="us">
        <span aria-hidden="true" style="font-size: 1.25rem; line-height: 1;">🇺🇸</span>
        <span class="text">United States</span>
        <span style="color: #6e7781; font-size: 0.85em; margin-left: auto;">USD</span>
      </option>

      <option value="gb">
        <span aria-hidden="true" style="font-size: 1.25rem; line-height: 1;">🇬🇧</span>
        <span class="text">United Kingdom</span>
        <span style="color: #6e7781; font-size: 0.85em; margin-left: auto;">GBP</span>
      </option>

      <option value="jp">
        <span aria-hidden="true" style="font-size: 1.25rem; line-height: 1;">🇯🇵</span>
        <span class="text">Japan</span>
        <span style="color: #6e7781; font-size: 0.85em; margin-left: auto;">JPY</span>
      </option>

      <option value="ca">
        <span aria-hidden="true" style="font-size: 1.25rem; line-height: 1;">🇨🇦</span>
        <span class="text">Canada</span>
        <span style="color: #6e7781; font-size: 0.85em; margin-left: auto;">CAD</span>
      </option>
    </select>
  </div>

</body>

</html>
