<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intl.Locale info demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .locale-block { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
    dt { font-weight: bold; margin-top: 0.5rem; }
    dd { margin-left: 0; margin-bottom: 0.5rem; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Intl.Locale Info</h1>
  
  <div class="locale-block" id="ar-EG-info">
    <h2>Locale: ar-EG</h2>
    <dl>
      <dt>Direction</dt>
      <dd id="ar-EG-dir">Loading...</dd>
      <dt>Calendars</dt>
      <dd id="ar-EG-cal">Loading...</dd>
      <dt>First Day of Week</dt>
      <dd id="ar-EG-week">Loading...</dd>
    </dl>
  </div>

  <div class="locale-block" id="en-US-info">
    <h2>Locale: en-US</h2>
    <dl>
      <dt>Direction</dt>
      <dd id="en-US-dir">Loading...</dd>
      <dt>Calendars</dt>
      <dd id="en-US-cal">Loading...</dd>
      <dt>First Day of Week</dt>
      <dd id="en-US-week">Loading...</dd>
    </dl>
  </div>

  <script>
    function displayLocaleInfo(localeStr, idPrefix) {
      const dirEl = document.getElementById(`${idPrefix}-dir`);
      const calEl = document.getElementById(`${idPrefix}-cal`);
      const weekEl = document.getElementById(`${idPrefix}-week`);

      if (typeof Intl === 'undefined' || !('getTextInfo' in Intl.Locale.prototype)) {
        dirEl.textContent = 'API not supported';
        dirEl.className = 'error';
        calEl.textContent = 'API not supported';
        calEl.className = 'error';
        weekEl.textContent = 'API not supported';
        weekEl.className = 'error';
        return;
      }

      const locale = new Intl.Locale(localeStr);

      // Text Info (Direction)
      const textInfo = locale.getTextInfo();
      dirEl.textContent = textInfo.direction;

      // Calendars
      const calendars = locale.getCalendars();
      calEl.textContent = calendars.join(', ');

      // Week Info
      const weekInfo = locale.getWeekInfo();
      // firstDay is 1-7 where 1 is Monday, 7 is Sunday.
      const days = ["None", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
      weekEl.textContent = days[weekInfo.firstDay] || weekInfo.firstDay;
    }

    displayLocaleInfo('ar-EG', 'ar-EG');
    displayLocaleInfo('en-US', 'en-US');
  </script>
</body>
</html>
