<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="75" cy="75" r="60" fill="rgba(255, 0, 0, 0.6)" />
  <rect x="150" y="50" width="100" height="100" fill="rgba(0, 0, 255, 0.6)" />
  <polygon points="20,180 150,120 280,180" fill="rgba(0, 255, 0, 0.6)" />
  <text x="10" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333">SVG TEST PATTERN</text>
</svg>
