<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer with Intl.DurationFormat</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f3f4f6;
    color: #1f2937;
  }
  .card {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    text-align: center;
  }
  h1 {
    margin-top: 0;
    font-size: 1.25rem;
    color: #4b5563;
  }
  #timer {
    font-size: 3rem;
    font-weight: bold;
    font-variant-numeric: tabular-nums;
    margin: 1rem 0;
    color: #2563eb;
  }
  .warning {
    color: #dc2626;
    font-size: 0.875rem;
    max-width: 300px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Event Starts In</h1>
  <div id="timer">--:--:--</div>
  <div id="fallback-warning" class="warning" style="display: none;">
    Your browser does not support Intl.DurationFormat.
  </div>
</div>

<script>
  const timerElement = document.getElementById('timer');
  const warningElement = document.getElementById('fallback-warning');

  // Check for Intl.DurationFormat support
  if (!('DurationFormat' in Intl)) {
    warningElement.style.display = 'block';
    timerElement.textContent = 'Unsupported';
  } else {
    // Initialize the formatter for a countdown clock
    const durationFormatter = new Intl.DurationFormat(navigator.language, {
      style: 'digital',
      hours: 'numeric',
      minutes: '2-digit',
      seconds: '2-digit'
    });

    // 2 hours, 45 minutes, 10 seconds remaining
    let totalSecondsRemaining = (2 * 3600) + (45 * 60) + 10;

    function updateTimer() {
      if (totalSecondsRemaining <= 0) {
        timerElement.textContent = "0:00:00";
        return;
      }

      const hours = Math.floor(totalSecondsRemaining / 3600);
      const minutes = Math.floor((totalSecondsRemaining % 3600) / 60);
      const seconds = totalSecondsRemaining % 60;

      // Format the duration object into a string (e.g., "2:45:10")
      timerElement.textContent = durationFormatter.format({
        hours: hours,
        minutes: minutes,
        seconds: seconds
      });

      totalSecondsRemaining--;
    }

    // Initial update and start interval
    updateTimer();
    setInterval(updateTimer, 1000);
  }
</script>

</body>
</html>
