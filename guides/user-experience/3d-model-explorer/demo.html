<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Animations: Rotate 3D model on scroll</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
  <script type="module">
    import { trackProgress } from "https://esm.sh/@bramus/sda-utilities";

    const model = document.querySelector("model-viewer");
    trackProgress(model.getAnimations()[0], (progress) => {
      model.orientation = `0deg 0deg ${progress * -360}deg`;
    });
  </script>
  <style>
    @layer reset, base, demo;

    @layer demo {
      @keyframes foo {
        to {
          scale: 1;
        }
      }

      model-viewer {
        display: block;
        width: 100%;
        height: 95vh;
        position: fixed;
        animation: foo linear both;
        animation-timeline: scroll(block root);
        z-index: -1;
      }

      model-viewer::part(default-progress-bar) {
        display: none;
      }
    }

    @layer base {
      html {
        height: 400vh;
      }

      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        text-align: center;
        font-style: italic;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    alt="Nike Air Max 90"
    src="https://assets.codepen.io/89905/nike_air_max_90.glb"
  ></model-viewer>

  <footer>
    <p>3D Model <a href="https://skfb.ly/ou8Yp" target="_top">“Nike Air Max 90”</a> by StudioAira! – <a href="http://creativecommons.org/licenses/by-nc/4.0/" target="_top">CC BY-NC 4.0</a>.</p>
  </footer>
</body>
</html>
