<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heading Text Balance Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      max-width: 80ch;
      margin: 0 auto;
    }

    /* Target specific headings for balanced line-breaking */
    h1, h2 {
      text-wrap: balance;
      border: 1px dashed #ccc; /* Visual aid to show the container width vs text wrapping */
    }

    .container {
      width: 400px;
      resize: horizontal;
      overflow: auto;
      border: 1px solid #333;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>A Very Long Heading That Needs To Be Balanced Across Multiple Lines</h1>
    <p>This paragraph uses standard text wrapping, while the heading above uses <code>text-wrap: balance</code> to distribute text evenly.</p>
  </div>
</body>
</html>
