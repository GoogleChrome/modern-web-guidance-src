<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    .thumbnails {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .thumbnail {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      border: 3px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
      font-size: 0.8rem;
      opacity: 0.5;
      padding: 0;
    }
    .thumbnail.pending {
      border-color: rgba(0, 0, 0, 0.3);
      opacity: 0.8;
    }
    .thumbnail.active {
      border-color: #333;
      opacity: 1;
    }
    .thumbnail:nth-child(1) { background: #e74c3c; }
    .thumbnail:nth-child(2) { background: #3498db; }
    .thumbnail:nth-child(3) { background: #2ecc71; }
    .gallery {
      display: flex;
      width: 100%;
      max-width: 400px;
      overflow-x: auto;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .gallery-item {
      flex: 0 0 100%;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
    }
    .gallery-item:nth-child(1) { background: #e74c3c; }
    .gallery-item:nth-child(2) { background: #3498db; }
    .gallery-item:nth-child(3) { background: #2ecc71; }
    .gallery-item:nth-child(4) { background: #f39c12; }
    .gallery-item:nth-child(5) { background: #9b59b6; }
  </style>
</head>
<body>
  <h1>Gallery Demo</h1>
  <div class="thumbnails">
    <div class="thumbnail pending active">1</div>
    <div class="thumbnail pending active">2</div>
    <div class="thumbnail pending active">3</div>
  </div>
  <div class="gallery" id="gallery">
    <div class="gallery-item">Photo 1</div>
    <div class="gallery-item">Photo 2</div>
    <div class="gallery-item">Photo 3</div>
    <div class="gallery-item">Photo 4</div>
    <div class="gallery-item">Photo 5</div>
  </div>
  <script>
    var gallery = document.getElementById('gallery');
    var thumbs = document.querySelectorAll('.thumbnail');
    for (var i = 0; i < thumbs.length; i++) {
      (function(index) {
        thumbs[index].onclick = function() {
          gallery.scrollLeft = 200;
        };
      })(i);
    }
    gallery.onscroll = function() {
      for (var i = 0; i < thumbs.length; i++) {
        var w = thumbs[i].offsetWidth;
        thumbs[i].style.transform = 'scale(' + (1 + (gallery.scrollLeft % 10) / 100) + ')';
      }
    };
  </script>
</body>
</html>
