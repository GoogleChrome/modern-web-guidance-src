<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual Slider Component</title>
  <style>
    #slider-viewport {
      width: 400px;
      height: 250px;
      overflow: hidden;
      position: relative;
      background: #eee;
    }

    #slider-track {
      display: flex;
      position: absolute;
      top: 0;
      left: 0;
      transition: left 0.5s ease-in-out;
    }

    .slide-box {
      width: 400px;
      height: 250px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .controls {
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      background: #444;
      color: white;
      border: none;
      cursor: pointer;
    }

    .status-bar {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="slider-viewport">
    <div id="slider-track">
      <div class="slide-box" style="background: #222;">Item A</div>
      <div class="slide-box" style="background: #444;">Item B</div>
      <div class="slide-box" style="background: #666;">Item C</div>
      <div class="slide-box" style="background: #888;">Item D</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="go-left">Back</button>
    <button class="btn" id="go-right">Forward</button>
  </div>

  <div class="status-bar" id="pos-info">Current position: 0px</div>

  <script>
    let offset = 0;
    const track = document.getElementById('slider-track');
    const info = document.getElementById('pos-info');

    document.getElementById('go-right').onclick = () => {
      if (offset > -1200) {
        offset -= 400;
        track.style.left = offset + 'px';
        info.innerText = 'Current position: ' + offset + 'px';
      }
    };

    document.getElementById('go-left').onclick = () => {
      if (offset < 0) {
        offset += 400;
        track.style.left = offset + 'px';
        info.innerText = 'Current position: ' + offset + 'px';
      }
    };

    window.onkeydown = (e) => {
      if (e.key === 'ArrowRight') document.getElementById('go-right').click();
      if (e.key === 'ArrowLeft') document.getElementById('go-left').click();
    };
  </script>
</body>
</html>
