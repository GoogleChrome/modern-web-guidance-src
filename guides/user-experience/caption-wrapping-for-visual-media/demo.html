<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proportional Caption Wrapping Demo</title>
  <style>
    @font-face {
      font-family: 'Google Sans';
      src: url('https://fonts.gstatic.com/s/googlesans/v35/4UaGrENHsxJlGwyg_OUCIzQyLQ.woff2') format('woff2');
      font-weight: 400;
    }

    body {
      font-family: 'Google Sans', sans-serif;
      line-height: 1.6;
      color: #111;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #fff;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-top: 30px;
    }

    figure {
      margin: 0;
      width: fit-content;
      padding: 12px;
      background: #f8f9fa;
      border: 1px solid #dadce0;
      border-radius: 8px;
    }

    img {
      display: block;
      width: 300px;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
      background-color: #e8eaed;
    }

    figcaption {
      contain: inline-size;
      contain-intrinsic-size: auto 4.5em;

      padding-top: 12px;
      font-size: 0.9rem;
      color: #5f6368;
      font-style: italic;
    }

    .label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
      color: #111;
    }

    .no-contain figcaption {
      contain: none;
    }

    @media (max-width: 600px) {
      .demo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>Visual Media: Caption Wrapping</h1>
  <p>Compare how the horizontal axis isolation prevents text from breaking your layout structure.</p>

  <div class="demo-grid">
    <div class="no-contain">
      <span class="label">Standard (No Containment)</span>
      <figure>
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80"
          alt="Mountain landscape">
        <figcaption>
          In standard behavior, this long caption forces the entire figure container to expand horizontally to match the
          sentence length, breaking the alignment with the image.
        </figcaption>
      </figure>
    </div>

    <div class="with-contain">
      <span class="label">With Inline-Size Containment</span>
      <figure>
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80"
          alt="Mountain landscape">
        <figcaption>
          With containment, the caption is "caged" horizontally. It ignores its own width and wraps automatically to the
          image's 300px footprint, while <strong>intrinsic-size</strong> preserves the height.
        </figcaption>
      </figure>
    </div>
  </div>


</body>

</html>
