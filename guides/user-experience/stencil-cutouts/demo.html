<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stencil Cutouts Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    
    .notched-card {
      width: 300px;
      height: 200px;
      background-color: #3498db;
      color: white;
      padding: 20px;
      box-sizing: border-box;
      
      /* Apply the mask */
      -webkit-mask-image: url(#notch-stencil);
      mask-image: url(#notch-stencil);
    }
    
    /* Hide the SVG from view */
    svg {
      position: absolute;
      width: 0;
      height: 0;
    }
  </style>
</head>
<body>

  <!-- SVG Mask Definition -->
  <svg>
    <defs>
      <!-- Use objectBoundingBox to make the mask scale with the element -->
      <mask id="notch-stencil" maskContentUnits="objectBoundingBox">
        <!-- Fill the entire area with white (fully visible) -->
        <rect width="1" height="1" fill="white" />
        <!-- Draw a black circle at the top center to cut it out -->
        <circle cx="0.5" cy="0" r="0.1" fill="black" />
      </mask>
    </defs>
  </svg>

  <div class="notched-card">
    <h2>Card Title</h2>
    <p>This card has a circular notch cut out at the top center using an SVG mask.</p>
  </div>

</body>
</html>
