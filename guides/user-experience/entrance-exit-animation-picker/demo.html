<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrance and Exit Animation Picker Options Demo</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #f8fafc;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    p {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #e2e8f0;
    }

    /* Base Select Customization */
    select,
    ::picker(select) {
      /* Opt-in to customizable select */
      appearance: base-select;
    }

    select {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      color: #f8fafc;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    select:hover {
      background-color: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    select:focus-visible {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }

    /* Picker Dropdown Styles and Animation */
    ::picker(select) {
      padding: 0.5rem;
      background-color: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
      margin-top: 0.5rem;

      /* Base state for transition (Closed state) */
      opacity: 0;
      transform: translateY(-10px) scale(0.95);
      /* Use allow-discrete to animate top-layer show/hide */
      transition: 
        display 0.4s allow-discrete,
        overlay 0.4s allow-discrete,
        opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Open State */
    select:open::picker(select),
    select:popover-open::picker(select) {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Starting Style for Entry Animation */
    @starting-style {
      select:open::picker(select),
      select:popover-open::picker(select) {
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
      }
    }

    /* Option Styles */
    option {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: #cbd5e1;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    option:hover,
    option:focus-visible {
      background-color: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      outline: none;
    }

    option:checked {
      background-color: rgba(59, 130, 246, 0.25);
      color: #38bdf8;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Select Entrance Animation</h1>
    <p>Using <code>@starting-style</code> and <code>allow-discrete</code> to smoothly fade and slide the base-select dropdown.</p>
    
    <label for="theme">Choose a Theme</label>
    <select id="theme" name="theme">
      <option value="system">System Default</option>
      <option value="light">Light Mode</option>
      <option value="dark">Dark Mode</option>
      <option value="high-contrast">High Contrast</option>
      <option value="dim">Dim Background</option>
    </select>
  </div>

</body>
</html>
