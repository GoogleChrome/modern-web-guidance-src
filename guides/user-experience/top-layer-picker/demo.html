<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Layer Picker Demo</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #0ea5e9);
      color: #333;
    }

    .hero {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }

    h1 {
      margin-bottom: 0.5rem;
      font-size: 2.5rem;
    }

    p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    .open-modal-btn {
      padding: 12px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #4f46e5;
      background: white;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .open-modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    dialog {
      border: none;
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      background: white;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    dialog::backdrop {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.5rem;
      color: #0f172a;
    }

    .close-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      color: #64748b;
      cursor: pointer;
      transition: color 0.2s;
    }

    .close-btn:hover {
      color: #0f172a;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
    }

    /* Customizable Select Styles */
    select.custom-select {
      appearance: base-select;
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      color: #0f172a;
      background-color: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select.custom-select:hover {
      border-color: #cbd5e1;
    }

    select.custom-select:focus-visible {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    select.custom-select::picker(select) {
      padding: 0.5rem;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      margin-top: 0.5rem;
    }

    select.custom-select option {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      color: #334155;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    select.custom-select option:hover,
    select.custom-select option:focus-visible {
      background-color: #e0e7ff;
      color: #4338ca;
      outline: none;
    }

    select.custom-select option:checked {
      background-color: #4f46e5;
      color: white;
      font-weight: 600;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
    }

    .save-btn {
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      color: white;
      background-color: #4f46e5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .save-btn:hover {
      background-color: #4338ca;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Top Layer Demo</h1>
    <p>A customizable select inside a modal dialog.</p>
  </div>

  <button class="open-modal-btn" id="openModalBtn">Configure Settings</button>

  <dialog id="settingsModal">
    <div class="modal-header">
      <h2>Visual Preferences</h2>
      <button class="close-btn" id="closeModalBtn" aria-label="Close modal">&times;</button>
    </div>

    <div class="form-group">
      <label for="themeSelect">Select Theme</label>
      <select id="themeSelect" class="custom-select">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
        <option value="system">System Default</option>
        <option value="hc">High Contrast</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="save-btn" id="saveBtn">Save Preferences</button>
    </div>
  </dialog>

  <script>
    const modal = document.getElementById('settingsModal');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const saveBtn = document.getElementById('saveBtn');

    openBtn.addEventListener('click', () => {
      modal.showModal();
    });

    closeBtn.addEventListener('click', () => {
      modal.close();
    });

    saveBtn.addEventListener('click', () => {
      modal.close();
    });

    // Close on backdrop click
    modal.addEventListener('click', (e) => {
      const modalDimensions = modal.getBoundingClientRect();
      if (
        e.clientX < modalDimensions.left ||
        e.clientX > modalDimensions.right ||
        e.clientY < modalDimensions.top ||
        e.clientY > modalDimensions.bottom
      ) {
        modal.close();
      }
    });

    // Prevent backdrop click from closing the modal when clicking inside the content
    modal.querySelector(':scope > div').addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>

</html>
