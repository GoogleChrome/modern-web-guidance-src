<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Negative Demo</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 50px;
      background-color: #ffffff;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .box {
      width: 300px;
      padding: 40px;
      text-align: center;
      font-size: 24px;
      border: 5px solid #000;
      
      background-color: contrast-color(#000000);
      
      color: #ffffff;
    }

    .box-alt {
      width: 300px;
      padding: 40px;
      text-align: center;
      font-size: 24px;
      border: 5px solid #000;

      background-color: contrast-color(#ffffff);

      color: #000000;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">
      This text is hardcoded to white.
    </div>

    <div class="box-alt">
      This text is hardcoded to black.
    </div>
  </div>

</body>
</html>
