<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contrast-color() Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f0f0f0;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 2rem;
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 150px;
      height: 150px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      
      /* Apply the dynamic background */
      background-color: var(--badge-bg);
      
      /* Default assumption + Readability safety net for older browsers */
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Apply dynamic contrasting color only if supported */
    @supports (color: contrast-color(red)) {
      .badge {
        color: contrast-color(var(--badge-bg));
        text-shadow: none;
      }
    }

    /* Define different backgrounds for testing */
    .badge-dark {
      --badge-bg: #1a1a1a;
    }

    .badge-light {
      --badge-bg: #f9f9f9;
    }

    .badge-color {
      --badge-bg: #e02424;
    }
  </style>
</head>
<body>

  <h1>Dynamic Contrast using <code>contrast-color()</code></h1>

  <div class="container">
    <div class="badge badge-dark" data-testid="badge-dark">
      Dark Bg
    </div>
    <div class="badge badge-light" data-testid="badge-light">
      Light Bg
    </div>
    <div class="badge badge-color" data-testid="badge-color">
      Color Bg
    </div>
  </div>

</body>
</html>
