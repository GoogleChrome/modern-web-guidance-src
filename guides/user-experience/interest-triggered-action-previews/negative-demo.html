<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Color Previewer</title>
    <style>
      .swatches {
        display: flex;
        gap: 10px;
      }

      .swatch {
        width: 40px;
        height: 40px;
        border: 1px solid #000;
        cursor: pointer;
      }

      .swatch:hover, .swatch:focus {
        outline: 2px solid blue;
      }

      #display {
        width: 200px;
        height: 200px;
        border: 1px solid #ccc;
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Color Previewer</h1>
      <div class="swatches">
        <button class="swatch" data-color="red" style="background: red;"></button>
        <button class="swatch" data-color="blue" style="background: blue;"></button>
        <button class="swatch" data-color="green" style="background: green;"></button>
      </div>
      <div id="display">Hover a color</div>
    </main>
    <script>
      const swatches = document.querySelectorAll('.swatch');
      const display = document.getElementById('display');

      swatches.forEach(swatch => {
        swatch.addEventListener('mouseenter', () => {
          display.style.backgroundColor = swatch.dataset.color;
          display.textContent = swatch.dataset.color;
        });

        swatch.addEventListener('mouseleave', () => {
          display.style.backgroundColor = '';
          display.textContent = 'Hover a color';
        });

        swatch.addEventListener('click', () => {
          alert('Color selected: ' + swatch.dataset.color);
        });
      });
    </script>
  </body>
</html>
