<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Interest-Triggered Action Previews</title>
    <style>
      .color-grid {
        display: flex;
        gap: 8px;
      }

      .color-grid button {
        width: 3rem;
        height: 3rem;
        border: 2px solid #ccc;
        border-radius: 6px;
        --interest-delay-start: 300ms;
        interest-delay-start: 300ms;
        --interest-delay-end: 0ms;
        interest-delay-end: 0ms;
      }

      /* Style the invoker while interest is shown */
      .color-grid button:is(:interest-source, .interest-source) {
        border-color: #000;
      }

      .preview-box {
        background-clip: padding-box;
        width: 100%;
        height: 8rem;
        border: 2px solid #ccc;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        transition: background-color 0.2s, border-style 0.2s;
      }

      /* Style the target while interest is shown */
      .preview-box:is(:interest-target, .interest-target) {
        border-style: dashed;
        border-color: #666;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Interest-Triggered Action Previews</h1>
      <p>Hover over or focus on a color swatch to preview how the box would look. Click to permanently apply the color.</p>

      <p class="color-grid">
        <button
          interestfor="preview-box"
          style="background: #ef4444"
          data-color="#ef4444"
          aria-label="Red"
        ></button>
        <button
          interestfor="preview-box"
          style="background: #3b82f6"
          data-color="#3b82f6"
          aria-label="Blue"
        ></button>
        <button
          interestfor="preview-box"
          style="background: #22c55e"
          data-color="#22c55e"
          aria-label="Green"
        ></button>
      </p>

      <div id="preview-box" class="preview-box">Preview Area</div>
    </main>
    <script type="module">
      if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
        await import("https://unpkg.com/interestfor@latest");
      }

      const previewBox = document.getElementById('preview-box');
      let appliedColor = '';

      // The 'interest' event fires on the target element
      previewBox.addEventListener('interest', (e) => {
        // e.source is the element that triggered the interest
        previewBox.style.backgroundColor = e.source.dataset.color;
        previewBox.textContent = `Previewing ${e.source.ariaLabel}`;
      });

      // The 'loseinterest' event fires when the user stops interacting
      previewBox.addEventListener('loseinterest', () => {
        previewBox.style.backgroundColor = appliedColor;
        previewBox.textContent = appliedColor ? 'Color Applied' : 'Preview Area';
      });

      document.querySelectorAll('.color-grid button').forEach((btn) => {
        btn.addEventListener('click', () => {
          appliedColor = btn.dataset.color;
          previewBox.style.backgroundColor = appliedColor;
          previewBox.textContent = 'Color Applied';
        });
      });
    </script>
  </body>
</html>
