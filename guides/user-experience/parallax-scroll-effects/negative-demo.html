<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Animations: Parallax Animation</title>
  <style>
    html {
      height: 100%;
    }
    body {
      height: 400vh;
      margin: 0;
    }
    .wrapper {
      position: relative;
      height: 100vh;
      border: 1px dotted;
      overflow: visible;
    }
    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      text-align: center;
      font-size: 10vw;
      color: rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="layer">LAYER 0</div>
    <div class="layer">LAYER 1</div>
    <div class="layer">LAYER 2</div>
    <div class="layer">LAYER 3</div>
    <div class="layer">LAYER 4</div>
    <div class="layer">LAYER 5</div>
    <div class="layer">LAYER 6</div>
  </div>
  <script>
    window.addEventListener('scroll', function() {
      var layers = document.querySelectorAll('.layer');
      for (var i = 0; i < layers.length; i++) {
        layers[i].style.paddingTop = window.scrollY + 'px';
      }
    });
  </script>
</body>
</html>
