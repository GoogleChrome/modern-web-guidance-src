<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Animations: Text Reveal Character by Character</title>
  <style>
    @layer reset, base, demo;

    @layer demo {
      #demo {
        position: sticky;
        inset: auto;
        top: 50%;
        font-size: 1.25em;
        width: 90vw;

        text-align: center;
        font-family: monospace;

        --chars: 34; /* The number of characters in the sentence */
      }

      span {
        background: 
          /* Base color */
          #eee
          /* Highlight gradient */
          linear-gradient(to right, #6300ff 0%, #e915c7 100%)
          /* Other Background longhands (position, size, and repeat) */
          0px 50% / 0 no-repeat;
        -webkit-background-clip: text;
        color: transparent;

        animation: text steps(var(--chars)) forwards;
        animation-timeline: scroll(root);
      }

      @keyframes text {
        0% {
          background-size: 0ch;
        }
        100% {
          background-size: calc(var(--chars) * 1ch);
        }
      }
    }

    @layer base {
      html {
        font-size: clamp(16px, 2vmax + 1em, 42px);
      }
      body {
        height: 400dvh;
      }
    }

    @layer reset {
      * {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <p id="demo"><span>Text Reveal Character by Character</span></p>
</body>
</html>
