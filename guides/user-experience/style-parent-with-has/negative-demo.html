<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Styling</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    body:has(:invalid) {
      border-top: 5px solid red;
    }
    .card {
      border: 2px solid red;
      padding: 1.5rem;
    }
    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .status-icon::after {
      content: "✅";
    }
  </style>
</head>
<body>
  <h1>Parent Styling</h1>
  <div>
    <label>
      <input type="checkbox" id="force-fallback">
      Force Fallback Mode
    </label>
  </div>
  <div class="card" id="profile-card">
    <div class="header">
      <h3>User Profile</h3>
      <span class="status-icon"></span>
    </div>
    <form id="demo-form">
      <div class="form-group">
        <label for="username">Username (Required)</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="email">Email (Required)</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div>
        <button type="submit">Save</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </div>
  <script>
    var inputs = document.getElementsByTagName('input');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].setAttribute('data-state', 'dirty');
      inputs[i].onkeydown = function() {
        document.getElementById('profile-card').style.backgroundColor = '#ffe6e6';
      };
    }
  </script>
</body>
</html>
