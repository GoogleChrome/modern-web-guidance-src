<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Complex Shapes Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: black;
    }

    /* The element to be masked */
    .shaped-element {
      width: 200px;
      height: 200px;
      background-color: #e74c3c;

      /* Apply the mask */
      -webkit-mask-image: url(#star-mask);
      mask-image: url(#star-mask);

      /* Improve text view */
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      font-weight: bold;
      padding: 40px 0;
      box-sizing: border-box;
    }

    /* Fallback for browsers that do not support masking */
    @supports (not (mask-image: url(x))) and (not (-webkit-mask-image: url(x))) {
      .shaped-element {
        /* Use a simple rounded rectangle as fallback */
        clip-path: inset(5% round 15px);
      }
    }

  </style>
</head>

<body>
  <!-- SVG Mask Definition (hidden from view) -->
  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <!-- Use objectBoundingBox to make it scale -->
      <mask id="star-mask" maskContentUnits="objectBoundingBox">
        <!-- White reveals, black hides, gray creates semi-transparency -->
        <!-- A simple star shape path in normalized coordinates (0 to 1) -->
        <path
          d="M 0.5,0 L 0.625,0.375 L 1,0.375 L 0.7,0.625 L 0.8125,1 L 0.5,0.75 L 0.1875,1 L 0.3,0.625 L 0,0.375 L 0.375,0.375 Z"
          fill="white" />
        <!-- A gray circle in the center to demonstrate semi-transparency -->
        <circle cx="0.5" cy="0.5" r="0.2" fill="gray" />
      </mask>
    </defs>
  </svg>
  
  <div class="shaped-element">
    This element (including text) is clipped by the star!
  </div>

</body>

</html>
