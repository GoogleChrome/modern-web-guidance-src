<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Complex Shapes Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: black;
    }

    /* The element to be masked */
    .shaped-element {
      width: 200px;
      height: 200px;
      background-color: #e74c3c;

      /* Apply the mask */
      -webkit-mask-image: url(#star-mask);
      mask-image: url(#star-mask);

      /* Improve text view */
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      font-weight: bold;
      padding: 40px 0;
      box-sizing: border-box;
    }

    /* Fallback for browsers that support clip-path but not mask-image */
    @supports (not (mask-image: url(x))) and (clip-path: inset(0)) {
      .shaped-element {
        /* Use a simple rounded rectangle as fallback */
        clip-path: inset(5% round 15px);
      }
    }

    /* Hide the SVG from view */
    svg {
      position: absolute;
      width: 0;
      height: 0;
    }
  </style>
</head>

<body>
  <!-- SVG Mask Definition -->
  <svg>
    <defs>
      <!-- Use objectBoundingBox to make it scale -->
      <mask id="star-mask" maskContentUnits="objectBoundingBox">
        <!-- White reveals, black hides -->
        <!-- A simple star shape path in normalized coordinates (0 to 1) -->
        <path
          d="M 0.5,0 L 0.625,0.375 L 1,0.375 L 0.7,0.625 L 0.8125,1 L 0.5,0.75 L 0.1875,1 L 0.3,0.625 L 0,0.375 L 0.375,0.375 Z"
          fill="white" />
      </mask>
    </defs>
  </svg>
  
  <div class="shaped-element">
    This element (including text) is clipped by the star!
  </div>

</body>

</html>
