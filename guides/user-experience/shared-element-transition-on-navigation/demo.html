<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Shared Element Transition</title>
  <style>
    /* CORE: View Transitions API */
    .thumb,
    .hero {
      view-transition-name: product-image;
    }

    .item {
      view-transition-class: grid-item;
    }

    ::view-transition-group(.grid-item) {
      animation-duration: 500ms;
    }

    /* DEMO: Styling */
    body {
      font-family: monospace;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .item {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      cursor: pointer;
    }

    .thumb {
      width: 100%;
      height: 100px;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .detail {
      display: none;
      margin: 20px 0;
    }

    .detail.active {
      display: block;
    }

    .hero {
      width: 100%;
      height: 200px;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      margin-bottom: 15px;
    }

    button {
      padding: 8px 16px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    a {
      color: #0066cc;
      margin-top: 20px;
      display: block;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h1>Shared Element Transition</h1>

  <div class="grid" id="grid">
    <div class="item" onclick="show(0)">
      <div class="thumb">📱</div>
      <div>Phone</div>
    </div>
    <div class="item" onclick="show(1)">
      <div class="thumb">⌚</div>
      <div>Watch</div>
    </div>
  </div>

  <div class="detail" id="detail">
    <button onclick="back()">← Back</button>
    <div class="hero" id="hero"></div>
    <h2 id="name"></h2>
    <p id="desc"></p>
  </div>

  <script>
    /* DEMO: Item Data */
    const items = [
      { emoji: '📱', name: 'Phone', desc: 'Latest smartphone' },
      { emoji: '⌚', name: 'Watch', desc: 'Smart wearable' }
    ];

    /* CORE: Shared Element Transition Handler */
    function show(i) {
      if (!document.startViewTransition) return showDetail(i);
      document.startViewTransition(() => showDetail(i));
    }

    /* DEMO: Update DOM */
    function showDetail(i) {
      document.getElementById('hero').textContent = items[i].emoji;
      document.getElementById('name').textContent = items[i].name;
      document.getElementById('desc').textContent = items[i].desc;
      document.getElementById('grid').style.display = 'none';
      document.getElementById('detail').classList.add('active');
    }

    /* CORE: Reverse Transition Handler */
    function back() {
      if (!document.startViewTransition) {
        document.getElementById('detail').classList.remove('active');
        document.getElementById('grid').style.display = 'grid';
        return;
      }
      document.startViewTransition(() => {
        document.getElementById('detail').classList.remove('active');
        document.getElementById('grid').style.display = 'grid';
      });
    }
  </script>
</body>
</body>

</html>
