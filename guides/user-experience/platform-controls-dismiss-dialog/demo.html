<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Platform controls dismiss dialog</title>
	</head>
	<body>
		<main>
			<h1>Platform controls dismiss dialog</h1>
			<p><button command="show-modal" commandfor="modal-default">Show default modal dialog</button></p>
			<dialog id="modal-default" aria-labelledby="modal-default-label">
				<h1 id="modal-default-label">Default modal dialog</h1>
				<p>This modal dialog closes with close requests.</p>
				<button command="close" commandfor="modal-default">Close</button>
			</dialog>
			<p><button command="show-modal" commandfor="modal-closedby-any">Show modal dialog with <code>closedby="any"</code></code></button></p>
			<dialog id="modal-closedby-any" closedby="any" aria-labelledby="modal-closedby-any-label">
				<h1 id="modal-closedby-any-label">Modal dialog with <code>closedby="any"</code></h1>
				<p>This modal dialog closes with close requests and light dismiss.</p>
				<button command="close" commandfor="modal-closedby-any">Close</button>
			</dialog>
		</main>
	</body>
</html>
