<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Custom dialog implementation</title>
		<style>
			.backdrop {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.5);
				justify-content: center;
				align-items: center;
			}
			.backdrop.active {
				display: flex;
			}
			.content {
				background: white;
				padding: 20px;
				border-radius: 4px;
				max-width: 500px;
				width: 100%;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Custom dialog implementation</h1>
			<p><button id="open-btn">Show custom modal dialog</button></p>
			
			<div id="custom-modal" class="backdrop">
				<div class="content">
					<h1>Custom modal dialog</h1>
					<p>This is a custom modal dialog built with manual event listeners.</p>
					<button id="close-btn">Close</button>
				</div>
			</div>
		</main>
		<script>
			const modal = document.getElementById('custom-modal');
			const openBtn = document.getElementById('open-btn');
			const closeBtn = document.getElementById('close-btn');

			function openModal() {
				modal.classList.add('active');
				history.pushState({ modalOpen: true }, '');
			}

			function closeModal() {
				modal.classList.remove('active');
				if (history.state && history.state.modalOpen) {
					history.back();
				}
			}

			openBtn.addEventListener('click', openModal);
			closeBtn.addEventListener('click', closeModal);

			window.addEventListener('popstate', (event) => {
				if (modal.classList.contains('active')) {
					modal.classList.remove('active');
				}
			});

			window.addEventListener('keydown', (event) => {
				if (event.key === 'Escape' && modal.classList.contains('active')) {
					closeModal();
				}
			});

			modal.addEventListener('click', (event) => {
				if (event.target === modal) {
					closeModal();
				}
			});
		</script>
	</body>
</html>
