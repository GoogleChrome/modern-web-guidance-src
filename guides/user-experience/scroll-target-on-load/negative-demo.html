<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>
  <style>
    .container {
      width: 500px;
    }
    .item img {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">
      <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=400&auto=format&fit=crop">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=400&auto=format&fit=crop">
    </div>
    <div class="item" id="target">
      <img src="https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=400&auto=format&fit=crop">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=400&auto=format&fit=crop">
    </div>
  </div>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var el = document.getElementById('target');
        el.scrollIntoView({ behavior: 'smooth' });
      }, 1000);
    });
  </script>
</body>
</html>
