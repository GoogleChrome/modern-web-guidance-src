<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation Thread</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    .message img {
      max-width: 100%;
      display: block;
      margin-top: 5px;
    }

    .highlight {
      background: #e3f2fd;
      border: 1px solid #2196f3;
    }
  </style>
</head>
<body>

  <h1>Chat History</h1>

  <div class="chat-list">
    <div class="message">
      <p>Starting the project today.</p>
    </div>
    
    <div class="message">
      <p>Check out this reference image:</p>
      <img src="https://picsum.photos/id/237/400/300" alt="Reference">
    </div>

    <div class="message">
      <p>I think we should go with a darker theme.</p>
    </div>

    <div class="message">
      <p>Another example here:</p>
      <img src="https://picsum.photos/id/238/400/300" alt="Example">
    </div>

    <div class="message highlight" id="msg-target">
      <p>This is the important message we need to discuss.</p>
    </div>

    <div class="message">
      <p>Let me know what you think.</p>
    </div>

    <div class="message">
      <p>I'll be available later today.</p>
    </div>
    
    <div class="message">
      <p>Here is one more thing:</p>
      <img src="https://picsum.photos/id/239/400/300" alt="Additional">
    </div>
  </div>

  <script>
    window.onload = function() {
      const target = document.getElementById('msg-target');
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    };
  </script>
</body>
</html>
