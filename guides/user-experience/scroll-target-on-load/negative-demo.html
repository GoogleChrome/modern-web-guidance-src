<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll View</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .wrapper {
      overflow: visible;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    
    .post {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 8px;
      scroll-initial-target: nearest;
    }
    
    .post img {
      width: 100%;
    }
    
    .active {
      border-color: blue;
      background: #f0f8ff;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="post">
      <h3>First Post</h3>
      <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop" alt="First">
    </div>
    
    <div class="post">
      <h3>Second Post</h3>
      <img src="https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=400&auto=format&fit=crop" alt="Second">
    </div>
    
    <div class="post active" id="focus-item">
      <h3>Third Post</h3>
      <img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=400&auto=format&fit=crop" alt="Third">
    </div>
    
    <div class="post">
      <h3>Fourth Post</h3>
      <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop" alt="Fourth">
    </div>
  </div>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('focus-item').scrollIntoView({
          behavior: 'smooth'
        });
      }, 1500);
    });
  </script>
</body>
</html>
