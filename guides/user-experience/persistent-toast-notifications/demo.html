<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .toast-container {
      anchor-name: --toast-container;
      position: fixed;
      width: 100cqi;
      height: 4rem;
      bottom: 1rem;
    }

    [popover="manual"] {
      position-anchor: --toast-container;
      position-area: bottom;
      margin-bottom: calc(sibling-index() * 1rem);
      padding: 0.5rem 1rem;
      background: lightgreen;
      border: 1px solid green;
      border-radius: 8px;
      transition: opacity 0.3s, transform 0.3s, display 0.3s, overlay 0.3s;
      transition-behavior: allow-discrete;
      opacity: 0;
      transform: translateY(20px);
    }

    [popover="manual"]:popover-open {
      opacity: 1;
      transform: translateY(0);
    }

    @starting-style {
      [popover="manual"]:popover-open { 
        opacity: 0; 
        transform: translateY(20px);
      }
    }

    button[popovertargetaction="hide"] {
      background:none;
      border:none;
      cursor:pointer;
    }

    body {
      min-height: 100dvh;
      min-width: 100dvw;
      padding: 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <button id="toast-trigger" onclick="showToast()">Trigger Toast</button>
  <div class="toast-container">
    <div id="toast" popover="manual" role="status" aria-live="polite">
      Success!
      <button popovertarget="toast" popovertargetaction="hide" aria-label="close">x</button>
    </div>
  </div>
  <script>
    let timerId;
    let remainingTime = 3000;
    let startTime;
    const t = document.getElementById('toast');

    function startTimer() {
      startTime = Date.now();
      timerId = setTimeout(() => {
        if (t.matches(':popover-open')) t.hidePopover();
      }, remainingTime);
    }

    function pauseTimer() {
      clearTimeout(timerId);
      remainingTime -= (Date.now() - startTime);
    }

    function showToast() {
      remainingTime = 3000;
      t.showPopover();
      startTimer();
    }

    t.addEventListener('pointerenter', pauseTimer);
    t.addEventListener('focusin', pauseTimer);
    t.addEventListener('pointerleave', startTimer);
    t.addEventListener('focusout', startTimer);
  </script>
</body>
</html>
