<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Interactive Carousel with Sliding Highlight</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 2rem;
      color: #111;
      text-align: center;
    }

    /* 
   * 1. Carousel Container Setup
   */
    .carousel-wrapper {
      position: relative;
      /* Containing block for the sliding highlight */
      width: 100%;
      max-width: 600px;
    }

    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;

      /* Hide scrollbar */
      scrollbar-width: none;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);

      /* Native Scroll Markers (The Dots) */
      scroll-marker-group: after;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    /* Layout for the native marker group container */
    .carousel::scroll-marker-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      padding-top: 1.5rem;
    }

    /* 
   * 2. Carousel Items 
   */
    .item {
      flex: 0 0 100%;
      height: 350px;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: bold;
      color: white;
    }

    .item:nth-child(1) {
      background: #FF6B6B;
    }

    .item:nth-child(2) {
      background: #4ECDC4;
    }

    .item:nth-child(3) {
      background: #45B7D1;
    }

    .item:nth-child(4) {
      background: #96CEB4;
    }

    /* 
   * 3. The Generated Scroll Markers 
   */
    .item::scroll-marker {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #d1d1d1;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    /* Set the first dot as the default anchor on page load */
    .item:first-child::scroll-marker {
      anchor-name: --active-dot;
    }

    /* 
    * 4. Anchor Positioning & :target-current
    * Name the currently active marker so our highlight can follow it 
    */
    .item::scroll-marker:target-current {
      anchor-name: --active-dot;
    }


    /* 
    * 5. The Sliding Highlight Indicator 
    */
    .sliding-highlight {
      position: absolute;
      /* Tether to the active dot */
      position-anchor: --active-dot;
      /* Snap to the top-left of the anchor */
      top: anchor(top);
      left: anchor(left);
      /* Match the size of the anchor dynamically */
      width: anchor-size(width, 16px);
      height: anchor-size(height, 16px);

      border-radius: 50%;
      background: #111;
      pointer-events: none;
      /* Allow clicking through to the actual marker */

      /* The magic that makes it glide smoothly */
      transition: top 0.4s cubic-bezier(0.25, 1, 0.5, 1),
        left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 
   * 6. Progressive Enhancement / Fallback Logic 
   */
    .fallback-pagination {
      display: none;
    }

    /* If the browser does NOT support anchor positioning or scroll markers */
    @supports not ((position-anchor: --test) and (scroll-marker-group: after)) {
      .sliding-highlight {
        display: none;
      }

      .carousel::scroll-marker-group {
        display: none;
      }

      .fallback-pagination {
        display: flex;
        gap: 16px;
        justify-content: center;
        padding-top: 1.5rem;
      }

      .fallback-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #d1d1d1;
        border: none;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .fallback-dot.active {
        background: #111;
      }
    }
  </style>
</head>

<body>
  <h1>CSS Anchor Carousels</h1>

  <div class="carousel-wrapper">
    <ul class="carousel" id="carousel">
      <li class="item" id="item-1">1</li>
      <li class="item" id="item-2">2</li>
      <li class="item" id="item-3">3</li>
      <li class="item" id="item-4">4</li>
    </ul>

    <div class="sliding-highlight"></div>

    <div class="fallback-pagination" id="fallback-pagination">
      <button class="fallback-dot active" data-target="item-1" aria-label="Go to slide 1"></button>
      <button class="fallback-dot" data-target="item-2" aria-label="Go to slide 2"></button>
      <button class="fallback-dot" data-target="item-3" aria-label="Go to slide 3"></button>
      <button class="fallback-dot" data-target="item-4" aria-label="Go to slide 4"></button>
    </div>
  </div>

  <script>
    // Fallback Logic for Older Browsers
    if (!CSS.supports('position-anchor: --test') || !CSS.supports('scroll-marker-group: after')) {
      const carousel = document.getElementById('carousel');
      const items = document.querySelectorAll('.item');
      const dots = document.querySelectorAll('.fallback-dot');

      // Click to scroll
      dots.forEach(dot => {
        dot.addEventListener('click', (e) => {
          const targetId = e.target.getAttribute('data-target');
          document.getElementById(targetId).scrollIntoView({
            behavior: 'smooth', block: 'nearest', inline: 'start'
          });
        });
      });

      // Update dots on scroll using IntersectionObserver
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            dots.forEach(d => d.classList.remove('active'));
            const activeDot = document.querySelector(`.fallback-dot[data-target="${entry.target.id}"]`);
            if (activeDot) activeDot.classList.add('active');
          }
        });
      }, {
        root: carousel,
        threshold: 0.6 // Trigger when slide is 60% visible
      });

      items.forEach(item => observer.observe(item));
    }
  </script>

</body>

</html>
