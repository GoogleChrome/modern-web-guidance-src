<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Reveal</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      width: 600px;
      height: 400px;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 2;
    }
    .spotlight {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, transparent 30%, #000 70%);
      border-radius: 50%;
      z-index: 3;
      transition: top 0.4s ease, left 0.4s ease;
    }
    .content {
      position: relative;
      z-index: 1;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box" id="container">
    <div class="content">
      <p>Hidden Content</p>
      <button onclick="alert('Clicked!')">Click Me</button>
    </div>
    <div class="overlay"></div>
    <div class="spotlight" id="follower"></div>
  </div>

  <script>
    const container = document.getElementById('container');
    const follower = document.getElementById('follower');

    container.onmousemove = function(e) {
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left - 100;
      const y = e.clientY - rect.top - 100;
      
      follower.style.left = x + 'px';
      follower.style.top = y + 'px';
    };
  </script>
</body>
</html>
