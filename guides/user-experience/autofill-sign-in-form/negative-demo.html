<!DOCTYPE html>
<html lang="en">
<head>
<title>Login</title>
<meta charset="utf-8">
<style>
body { font-family: sans-serif; margin: 20px; }
.input-container { margin-bottom: 15px; }
.fake-label { font-size: 14px; margin-bottom: 5px; display: block; }
.text-box { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
.submit-btn { padding: 10px 20px; background: #007bff; color: white; cursor: pointer; display: inline-block; text-align: center; }
</style>
</head>
<body>
<div id="login-container">
<h1>Login</h1>
<div class="input-container">
<span class="fake-label">Email Address</span>
<input class="text-box" type="text" autocomplete="off">
</div>
<div class="input-container">
<span class="fake-label">Confirm Email Address</span>
<input class="text-box" type="text" autocomplete="off">
</div>
<div class="input-container">
<span class="fake-label">Password</span>
<input class="text-box" type="text" autocomplete="off">
</div>
<div class="input-container">
<span class="fake-label">Confirm Password</span>
<input class="text-box" type="text" autocomplete="off">
</div>
<div class="submit-btn" onclick="submitData()">Continue</div>
</div>
<script>
function submitData() {
  alert('Signed in');
}
</script>
</body>
</html>
