<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign In</title>
</head>
<body>
  <h1>Sign In</h1>
  <div id="sign-in-box">
    <section>
      <span>Email</span>
      <input id="email_input_1" name="email_input_1" type="text" autocomplete="off">
    </section>

    <section>
      <span>Confirm Email</span>
      <input id="email_input_2" name="email_input_2" type="text" autocomplete="off">
    </section>

    <section>
      <span>Password</span>
      <input id="pwd_input_1" name="pwd_input_1" type="text" autocomplete="off">
    </section>

    <section>
      <span>Confirm Password</span>
      <input id="pwd_input_2" name="pwd_input_2" type="text" autocomplete="off">
    </section>

    <div class="submit">Continue</div>
  </div>
</body>
</html>
