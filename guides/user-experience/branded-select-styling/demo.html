<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branded Select Styling Demo</title>
  <style>
    :root {
      --brand-primary: #6200ee;
      --brand-secondary: #03dac6;
      --brand-radius: 8px;
      
      /* Light theme defaults */
      --bg-color: #f5f5f5;
      --text-color: #333;
      --select-bg: white;
      --select-border: #ccc;
    }

    [data-theme="dark"] {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --select-bg: #1e1e1e;
      --select-border: #444;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 1rem;
    }

    .branded-select-container {
      margin: 2rem auto;
      width: 300px;
      text-align: left;
    }

    /* Base select styling */
    select {
      appearance: base-select;
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--select-border);
      border-radius: var(--brand-radius);
      background-color: var(--select-bg);
      color: var(--text-color);
      font-size: 16px;
      cursor: pointer;
      transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    select:focus {
      outline: none;
      border-color: var(--brand-primary);
    }

    /* Selected content styling */
    selectedcontent {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-grow: 1;
    }

    /* Custom Picker Styling */
    ::picker(select) {
      appearance: base-select;
      border: 2px solid var(--brand-primary);
      border-radius: var(--brand-radius);
      padding: 8px;
      background-color: var(--select-bg);
      color: var(--text-color);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    /* Picker Icon (Arrow) Styling */
    ::picker-icon {
      width: 12px;
      height: 12px;
      background: var(--brand-primary);
      clip-path: polygon(100% 0%, 0% 0%, 50% 100%);
      margin-left: 8px;
    }

    /* Option Styling */
    option {
      padding: 10px 12px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    option:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] option:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    option:checked {
      background-color: var(--brand-primary);
      color: white;
      font-weight: bold;
    }

    /* Checkmark Styling */
    ::checkmark {
      width: 16px;
      height: 16px;
      background-color: white;
      clip-path: polygon(14% 44%, 0 58%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }

    /* Rich content styling */
    .option-icon {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Branded Select Styling</h1>
    <p>This demo illustrates how to create a custom <code>&lt;select&gt;</code> that seamlessly matches a brand's design system using <code>appearance: base-select</code> and <code>&lt;selectedcontent&gt;</code>.</p>

    <div class="branded-select-container">
    <label for="theme-select" style="display: block; margin-bottom: 8px; font-weight: bold;">Select a Theme</label>
    <select id="theme-select">
      <selectedcontent></selectedcontent>
      <option value="light">
        <span class="option-icon">☀️</span>
        <span>Light Theme</span>
      </option>
      <option value="dark" selected>
        <span class="option-icon">🌙</span>
        <span>Dark Theme</span>
      </option>
      <option value="system">
        <span class="option-icon">💻</span>
        <span>System Default</span>
      </option>
    </select>
  </div>
</div>

<script>
  const themeSelect = document.getElementById('theme-select');
  const body = document.body;

  function applyTheme(theme) {
    if (theme === 'system') {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      body.setAttribute('data-theme', isDark ? 'dark' : 'light');
    } else {
      body.setAttribute('data-theme', theme);
    }
  }

  themeSelect.addEventListener('change', (e) => {
    applyTheme(e.target.value);
  });

  // Handle system theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (themeSelect.value === 'system') {
      applyTheme('system');
    }
  });

  // Initial apply
  applyTheme(themeSelect.value);
</script>
</body>
</html>
