<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stable Text Wrap</title>
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    p {
      text-wrap: stable;
    }
  

    
  </style>
</head>
<body>
  <p contenteditable="true">
    Adding text to this <code>contenteditable</code> box will only rewrap lines after the inserted text. 
  </p>
</body>
</body>
</html>
