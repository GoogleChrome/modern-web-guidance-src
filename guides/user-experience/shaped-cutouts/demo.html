<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shaped Cutouts Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      /* Grid background to demonstrate the transparent cutout */
      background-color: #e5e9f0;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    .notched-card {
      position: relative;
      width: 300px;
      height: 200px;
      color: white;
      padding: 20px;
      box-sizing: border-box;
      z-index: 1;
    }

    /* Apply the mask to a pseudo-element to protect text legibility and progressive enhancement */
    .notched-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #3498db;
      border-radius: 8px;
      z-index: -1;
      
      /* Apply the mask to the background shape only */
      -webkit-mask-image: url(#notch-stencil);
      mask-image: url(#notch-stencil);
    }
  </style>
</head>
<body>

  <!-- SVG Mask Definition -->
  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <!-- Use objectBoundingBox to make the mask scale with the element -->
      <mask id="notch-stencil" maskContentUnits="objectBoundingBox">
        <!-- Fill the entire area with white (fully visible) -->
        <rect width="1" height="1" fill="white" />
        <!-- Draw a black circle at the top center to cut it out -->
        <circle cx="0.5" cy="0" r="0.1" fill="black" />
      </mask>
    </defs>
  </svg>

  <div class="notched-card">
    <h2>Card Title</h2>
    <p>This card has a circular notch cut out at the top center using an SVG mask applied to a background pseudo-element
      stacked using z-index.</p>
  </div>

</body>
</html>
