<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Duration Display</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .video-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      background-color: #f9f9f9;
    }
    .video-placeholder {
      background-color: #ddd;
      height: 200px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      color: #666;
      font-weight: bold;
    }
    .duration-display {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      background: #e0e0e0;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="video-card">
    <div class="video-placeholder">Video Content Placeholder</div>
    <h2>Introduction to Web APIs</h2>
    <p>Total duration: <span id="duration-long" class="duration-display"></span></p>
    <p>Digital format: <span id="duration-digital" class="duration-display"></span></p>
  </div>

  <script>
    if ('DurationFormat' in Intl) {
      // The duration of the media content
      const mediaDuration = { hours: 1, minutes: 45, seconds: 30 };

      // Create a formatter for spoken/long text (e.g., "1 hour, 45 minutes, 30 seconds")
      const longFormatter = new Intl.DurationFormat(navigator.language, {
        style: 'long'
      });
      document.getElementById('duration-long').textContent = longFormatter.format(mediaDuration);

      // Create a formatter for digital/clock display (e.g., "1:45:30")
      const digitalFormatter = new Intl.DurationFormat(navigator.language, {
        style: 'digital'
      });
      document.getElementById('duration-digital').textContent = digitalFormatter.format(mediaDuration);
    } else {
      document.getElementById('duration-long').textContent = "Intl.DurationFormat not supported in this browser.";
      document.getElementById('duration-digital').textContent = "N/A";
    }
  </script>
</body>
</html>
