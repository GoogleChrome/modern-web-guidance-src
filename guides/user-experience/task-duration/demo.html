<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intl.DurationFormat Demo - Task Time Tracker</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .time-display {
            font-size: 2rem;
            font-weight: bold;
            margin: 1.5rem 0;
            color: #007bff;
        }
        .controls button {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }
        .controls button:hover { background-color: #0056b3; }
        .controls button:disabled { background-color: #ccc; cursor: not-allowed; }
        .error { color: #d9534f; margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Task Progress</h1>
    <p>Total time spent on this activity:</p>
    <div id="timeDisplay" class="time-display">0 minutes</div>
    <div class="controls">
        <button id="toggleBtn">Start Task</button>
    </div>
    <div id="supportError" class="error" style="display: none;">
        Your browser does not support <code>Intl.DurationFormat</code> yet.
    </div>
</div>

<script>
    const timeDisplay = document.getElementById('timeDisplay');
    const toggleBtn = document.getElementById('toggleBtn');
    const supportError = document.getElementById('supportError');

    let startTime = null;
    let timerInterval = null;
    let totalSeconds = 0;

    // Check for Intl.DurationFormat support
    const isSupported = typeof Intl.DurationFormat !== 'undefined';
    
    if (!isSupported) {
        supportError.style.display = 'block';
        toggleBtn.disabled = true;
    }

    // Initialize the formatter
    // Style 'long' results in "1 hour, 2 minutes, 3 seconds"
    const durationFormatter = isSupported ? new Intl.DurationFormat('en-US', {
        style: 'long',
        unitsDisplay: 'long'
    }) : null;

    function updateDisplay() {
        if (!durationFormatter) return;

        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        // Intl.DurationFormat accepts a duration object
        const duration = {
            hours,
            minutes,
            seconds
        };

        timeDisplay.textContent = durationFormatter.format(duration);
    }

    toggleBtn.addEventListener('click', () => {
        if (timerInterval) {
            // Stop
            clearInterval(timerInterval);
            timerInterval = null;
            toggleBtn.textContent = 'Resume Task';
        } else {
            // Start
            timerInterval = setInterval(() => {
                totalSeconds++;
                updateDisplay();
            }, 1000);
            toggleBtn.textContent = 'Pause Task';
        }
    });

    // Initial display
    if (isSupported) updateDisplay();
</script>

</body>
</html>
