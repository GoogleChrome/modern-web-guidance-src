<!DOCTYPE html>
<html>
<head>
  <title>Payment Form</title>
  <style>
    input:-webkit-autofill {
      background-color: yellow !important;
    }
    input:auto-fill {
      border: 1px solid red;
    }
    .btn {
      cursor: pointer;
      background: #000;
      color: #fff;
      padding: 10px;
      text-align: center;
      width: 100px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="payment-container">
    <h2>Enter Details</h2>

    <div>
      <span>First Name</span>
      <input type="text" id="fname" pattern="[A-Za-z]+">
    </div>
    <div>
      <span>Last Name</span>
      <input type="text" id="lname" pattern="[A-Za-z]+">
    </div>

    <div>
      <span>Address Line 1</span>
      <input type="text" id="addr1">
    </div>
    <div>
      <span>State</span>
      <input type="text" id="state">
    </div>
    <div>
      <span>Zip Code</span>
      <input type="text" id="zip">
    </div>

    <div>
      <span>CC Number</span>
      <input type="number" id="cc1" maxlength="4" style="width: 50px;"> -
      <input type="number" id="cc2" maxlength="4" style="width: 50px;"> -
      <input type="number" id="cc3" maxlength="4" style="width: 50px;"> -
      <input type="number" id="cc4" maxlength="4" style="width: 50px;">
    </div>

    <div>
      <span>Owner</span>
      <input type="text" id="ccname" autocomplete="off" pattern="[A-Za-z]+">
    </div>

    <div>
      <span>Expiration</span>
      <input type="number" id="exp-month" placeholder="MM"> /
      <input type="number" id="exp-year" placeholder="YYYY">
    </div>

    <div>
      <span>Sec</span>
      <input type="password" id="cvv" pattern="\d{3}" maxlength="3">
    </div>

    <div class="btn" onclick="alert('Saved')">
      Save
    </div>
  </div>
</body>
</html>
