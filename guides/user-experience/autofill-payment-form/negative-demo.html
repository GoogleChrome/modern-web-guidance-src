<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Payment Setup</title>
</head>
<body>
  <h1>Payment Info</h1>
  <div id="payment-details">
    <section>
      <span>Email Address</span>
      <input type="text" id="email_input" name="email_input">
    </section>

    <section>
      <span>Phone Number</span>
      <input type="text" id="phone_area" name="phone_area" maxlength="3">
      <input type="text" id="phone_prefix" name="phone_prefix" maxlength="3">
      <input type="text" id="phone_line" name="phone_line" maxlength="4">
    </section>

    <section>
      <span>First Name</span>
      <input type="text" id="fname" name="fname" pattern="[a-zA-Z]+" autocomplete="off">
    </section>

    <section>
      <span>Last Name</span>
      <input type="text" id="lname" name="lname" pattern="[a-zA-Z]+" autocomplete="off">
    </section>

    <section>
      <span>Card number</span>
      <input type="number" id="cc_part1" name="cc_part1">
      <input type="number" id="cc_part2" name="cc_part2">
      <input type="number" id="cc_part3" name="cc_part3">
      <input type="number" id="cc_part4" name="cc_part4">
    </section>

    <section>
      <span>Expiry date</span>
      <input type="number" id="exp_month" name="exp_month" placeholder="MM">
      <input type="number" id="exp_year" name="exp_year" placeholder="YY">
    </section>

    <section>
      <span>Security code</span>
      <input type="password" id="cvv" name="cvv">
    </section>

    <div onclick="submit()">Continue</div>
  </div>
</body>
</html>
