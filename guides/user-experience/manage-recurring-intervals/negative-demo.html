<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Interval Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --accent-primary: #58a6ff;
      --accent-secondary: #3fb950;
      --border-color: #30363d;
    }

    body {
      margin: 0;
      padding: 2rem;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #58a6ff 0%, #1f6feb 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls-bar {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 1.5rem;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .input-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
      min-width: 140px;
    }

    label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      background: #21262d;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.75rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-title {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .huge-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--accent-secondary);
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Financial Interval Manager</h1>
    </header>

    <div class="controls-bar">
      <div class="input-row">
        <div class="control-group">
          <label for="startDateInput">Start Date</label>
          <input type="date" id="startDateInput" value="2024-01-31">
        </div>
        <div class="control-group">
          <label for="monthsInput">Months to Add</label>
          <input type="number" id="monthsInput" value="1">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Calculated Date</div>
      <div id="resultDate" class="huge-value">-</div>
    </div>
  </div>

  <script>
    const startDateInput = document.getElementById('startDateInput');
    const monthsInput = document.getElementById('monthsInput');
    const resultDate = document.getElementById('resultDate');

    function updateCalculation() {
      const startDateStr = startDateInput.value;
      const months = parseInt(monthsInput.value) || 0;

      if (!startDateStr) {
        resultDate.textContent = "Select a start date";
        return;
      }

      const date = new Date(startDateStr);
      date.setMonth(date.getMonth() + months);

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');

      resultDate.textContent = `${year}-${month}-${day}`;
    }

    startDateInput.addEventListener('input', updateCalculation);
    monthsInput.addEventListener('input', updateCalculation);
    
    updateCalculation();
  </script>
</body>

</html>
