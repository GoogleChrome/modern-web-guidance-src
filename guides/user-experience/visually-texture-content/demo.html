<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visually Texture Content Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    
    .weathered-container {
      position: relative;
      width: 300px;
      height: 200px;
      background-color: #2ecc71; /* Base color */
      color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    /* Apply the mask to a background layer to protect text readability */
    .weathered-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #27ae60; /* Texture color */
      
      /* Apply the checkerboard mask */
      -webkit-mask-image: 
        linear-gradient(45deg, #000 25%, transparent 25%), 
        linear-gradient(-45deg, #000 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #000 75%), 
        linear-gradient(-45deg, transparent 75%, #000 75%);
      -webkit-mask-size: 10px 10px;
      -webkit-mask-position: 0 0, 0 5px, 5px -5px, -5px 0px;
      
      mask-image: 
        linear-gradient(45deg, #000 25%, transparent 25%), 
        linear-gradient(-45deg, #000 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #000 75%), 
        linear-gradient(-45deg, transparent 75%, #000 75%);
      mask-size: 10px 10px;
      mask-position: 0 0, 0 5px, 5px -5px, -5px 0px;
    }

    /* Fallback using CSS pattern for browsers without mask support */
    @supports not (mask-image: url(x)) {
      .weathered-bg {
        height:100%;
        width:100%;
        position: absolute;
        background-color: #2ecc71; /* Base color (light green) */
        background-image: 
          linear-gradient(45deg, #27ae60 25%, transparent 25%), 
          linear-gradient(-45deg, #27ae60 25%, transparent 25%), 
          linear-gradient(45deg, transparent 75%, #27ae60 75%), 
          linear-gradient(-45deg, transparent 75%, #27ae60 75%);
        background-size: 10px 10px;
        background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
      }
    }
    
    .content {
      position: relative;
      z-index: 1; /* Ensure text is above the background texture */
      padding: 20px;
    }
    
    h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
<div class="weathered-container">
  <div class="weathered-bg"></div>
  <div class="content">
    <h2>Textured Background</h2>
    <p>This demo applies the mask to a background layer.</p>
    </div>
  </div>

</body>
</html>
