<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animate to Intrinsic Sizes Demo</title>
  <style>
    :root {
      /* Opt-in to animating to/from intrinsic keywords */
      interpolate-size: allow-keywords;
      
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --accent: #007aff;
      --text: #1d1d1f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .accordion {
      inline-size: 100%;
      max-inline-size: 400px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .accordion-header {
      padding: 20px;
      background: none;
      border: none;
      inline-size: 100%;
      text-align: left;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
    }

    .accordion-header::after {
      content: '↓';
      transition: transform 0.3s ease;
    }

    .accordion.is-open .accordion-header::after {
      transform: rotate(180deg);
    }

    .accordion-content {
      /* Start at 0 block-size */
      block-size: 0;
      overflow: hidden;
      
      /* Standard transition on the block-size property */
      transition: block-size 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      
      border-block-start: 1px solid transparent;
    }

    .accordion.is-open .accordion-content {
      /* Transition to auto block-size! */
      block-size: auto;
      border-color: #eee;
    }

    .inner-padding {
      padding: 20px;
      line-height: 1.5;
    }

    /* calc-size() Example */
    .calc-demo {
      margin-top: 40px;
      max-inline-size: 400px;
      padding: 20px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      cursor: pointer;
      
      /* Initial fixed inline-size */
      inline-size: 80px;
      transition: inline-size 0.4s ease;
    }

    .badge:hover {
      /* Use calc-size to animate to max-content + extra space */
      inline-size: calc-size(max-content, size + 40px);
    }

    .badge::after {
      content: ' → More Info';
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .badge:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>

  <main>
    <div class="accordion" id="accordion">
      <button class="accordion-header" onclick="toggleAccordion()">
        What is interpolate-size?
      </button>
      <div class="accordion-content">
        <div class="inner-padding">
          <code>interpolate-size</code> is a new CSS property that allows browsers to smoothly transition between fixed lengths (like 0px) and intrinsic sizing keywords (like <code>auto</code>, <code>min-content</code>, or <code>max-content</code>).
        </div>
      </div>
    </div>

    <div class="calc-demo">
      <h3>calc-size() Example</h3>
      <p>Hover the badge to see it expand to its content width + 40px.</p>
      <div class="badge">Badge</div>
    </div>
  </main>

  <script>
    function toggleAccordion() {
      const accordion = document.getElementById('accordion');
      accordion.classList.toggle('is-open');
    }
  </script>
  </script>

</body>
</html>
