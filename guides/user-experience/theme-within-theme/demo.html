<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Theme Within Theme Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        padding: 1rem;
      }

      .container {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      /*
      System colors like Canvas and CanvasText adapt to the
      color-scheme of the element they are applied to.
    */
      .card {
        background-color: Canvas;
        color: CanvasText;
        border: 1px solid GrayText;
        padding: 1.5rem;
        border-radius: 8px;
      }

      .force-light {
        color-scheme: light;
      }

      .force-dark {
        color-scheme: dark;
      }
    </style>
  </head>
  <body>
    <h1>Theme Within Theme Demo</h1>
    <p>
      The <code>color-scheme</code> property combined with system colors is used
      to force specific components to use a designated color theme, regardless
      of the user's system preference.
    </p>

    <div class="container">
      <div class="card">
        <h2>Default</h2>
        <input type="text" placeholder="Text input" /><br /><br />
        <button>System Button</button>
        <input type="checkbox" checked />
      </div>

      <div class="card force-light">
        <h2>Forced Light</h2>
        <input type="text" placeholder="Text input" /><br /><br />
        <button>Light Button</button>
        <input type="checkbox" checked />
      </div>

      <div class="card force-dark">
        <h2>Forced Dark</h2>
        <input type="text" placeholder="Text input" /><br /><br />
        <button>Dark Button</button>
        <input type="checkbox" checked />
      </div>
    </div>
  </body>
</html>
