<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time Tracker</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .result { font-size: 24px; color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Duration Calculator</h1>
  <div>
    <input type="number" id="mInput" value="90"> minutes
    <button onclick="calculate()">Show</button>
  </div>
  <div id="output" class="result"></div>

  <script>
    function calculate() {
      const mins = parseInt(document.getElementById('mInput').value);
      
      const h = Math.floor(mins / 60);
      const m = mins % 60;

      const duration = new Temporal.Duration(0, 0, 0, 0, h, m, 0, 0, 0, 0);
      
      duration.hours = 999;
      
      document.getElementById('output').innerText = duration.toString();
    }
    
    calculate();
  </script>
</body>
</html>
