<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duration Balancing</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
    }
    .card {
      border: 1px solid #ccc;
      padding: 1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

  <div>
    <h1>Duration Balancing</h1>

    <div>
      <label>Hours <input type="number" id="hoursInput" value="0"></label>
      <label>Minutes <input type="number" id="minutesInput" value="90"></label>
      <label>Seconds <input type="number" id="secondsInput" value="0"></label>
    </div>

    <div class="card">
      <div>Human-Readable Format</div>
      <div id="humanValue"></div>
    </div>
  </div>

  <script>
    const hoursInput = document.getElementById('hoursInput');
    const minutesInput = document.getElementById('minutesInput');
    const secondsInput = document.getElementById('secondsInput');
    const humanValue = document.getElementById('humanValue');

    function updateAll() {
      const hours = parseInt(hoursInput.value) || 0;
      const minutes = parseInt(minutesInput.value) || 0;
      const seconds = parseInt(secondsInput.value) || 0;

      const totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
      const balancedHours = Math.floor(totalSeconds / 3600);
      const balancedMinutes = Math.floor((totalSeconds % 3600) / 60);
      const balancedSeconds = totalSeconds % 60;

      const duration = new Temporal.Duration();
      duration.hours = balancedHours;
      duration.minutes = balancedMinutes;
      duration.seconds = balancedSeconds;

      humanValue.textContent = duration.toString();
    }

    [hoursInput, minutesInput, secondsInput].forEach(el => el.addEventListener('input', updateAll));
    updateAll();
  </script>

</body>

</html>
