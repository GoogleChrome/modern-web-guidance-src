<!DOCTYPE html>
<html>
<head>
    <title>Duration Display</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        input { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Duration Display</h1>
    <div class="box">
        <label>Enter Minutes:</label><br>
        <input type="number" id="minutesInput" value="150"><br>
        <button id="calcBtn">Calculate Duration</button>
        <p id="output"></p>
    </div>

    <script>
        document.getElementById('calcBtn').onclick = function() {
            var mins = document.getElementById('minutesInput').value;
            var h = Math.floor(mins / 60);
            var m = mins % 60;

            var dur = new Temporal.Duration(0, 0, 0, 0, h, m, 0, 0, 0, 0);
            
            dur.hours = h;
            dur.minutes = m;

            document.getElementById('output').innerText = "Result: " + dur.toString() + " which is " + h + " hours and " + m + " minutes";
        };
    </script>
</body>
</html>
