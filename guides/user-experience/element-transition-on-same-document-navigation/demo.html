<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Tab Navigation</title>
  <style>
    /* CORE: View Transitions API */
    .tab.active {
      view-transition-name: active-tab;
    }

    /* DEMO: Styling */
    body {
      font-family: monospace;
      max-width: 500px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      border-bottom: 2px solid #ddd;
    }

    .tab-btn {
      padding: 8px 16px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #0066cc;
      border-bottom-color: #0066cc;
      font-weight: bold;
    }

    .tab {
      display: none;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .tab.active {
      display: block;
    }
  </style>
</head>

<body>
  <h1>Tab Navigation</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab1')">Tab 1</button>
    <button class="tab-btn" onclick="switchTab('tab2')">Tab 2</button>
  </div>

  <div class="tab active" id="tab1">
    <h2>Tab 1</h2>
    <p>First tab content</p>
  </div>
  <div class="tab" id="tab2">
    <h2>Tab 2</h2>
    <p>Second tab content</p>
  </div>

  <script>
    /* DEMO: Current tab state */
    let current = 'tab1';

    /* CORE: Tab transition with startViewTransition */
    function switchTab(id) {
      if (current === id) return;
      if (!document.startViewTransition) {
        updateTab(id);
        return;
      }
      document.startViewTransition(() => updateTab(id));
    }

    /* DEMO: Update DOM and button states */
    function updateTab(id) {
      document.getElementById(current).classList.remove('active');
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.onclick.toString().includes(`'${id}'`));
      });
      current = id;
    }
  </script>
</body>

</html>
