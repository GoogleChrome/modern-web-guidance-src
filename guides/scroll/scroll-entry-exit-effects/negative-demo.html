<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Animations: Reveal and Unreveal Effects</title>
  <script src="https://flackr.github.io/scroll-timeline/dist/scroll-timeline.js"></script>
  <style>
    @layer reset, base, demo;

    @layer demo {
      @layer scroll-driven-animations {
        @keyframes resize-element {
          from {
            width: 100px;
            height: 140px;
          }
          to {
            width: 200px;
            height: 280px;
          }
        }

        .scroller > * {
          animation-timeline: scroll();
          animation: resize-element 1s both;
        }
      }
    }

    @layer base {
      html {
        height: 100%;
      }
      body {
        height: 100%;
        place-content: center;
      }
      .scroller {
        display: flex;
        gap: 0.5em;
        overflow-x: scroll;
        scroll-behavior: smooth;
        border: 1px solid black;
        padding: 1em;
        width: 800px;
        max-width: 90vw;
        margin: 0 auto;
      }

      .scroller > * {
        flex-shrink: 0;
        width: 200px;
        aspect-ratio: 1/1.4;
        border: 1px solid black;
        place-content: center;
        text-align: center;
      }
    }

    @layer reset {
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      ul[class] {
        list-style: none;
      }
    }
  </style>
</head>
<body>
  <ul class="scroller">
    <li class="entry">1</li>
    <li class="entry">2</li>
    <li class="entry">3</li>
    <li class="entry">4</li>
    <li class="entry">5</li>
    <li class="entry">6</li>
    <li class="entry">7</li>
    <li class="entry">8</li>
    <li class="entry">9</li>
    <li class="entry">10</li>
  </ul>
</body>
</html>
