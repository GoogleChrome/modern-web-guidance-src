<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Translator Demo</title>
</head>

<body>
  <h1>Translator</h1>
  <p id="source" lang="en">The quick brown fox jumps over the lazy dog.</p>
  <form id="translate-form">
    <button type="submit">Translate</button>
  </form>
  <p id="translation"></p>

  <script type="module">
    const options = {
      sourceLanguage: 'en',
      targetLanguage: 'es',
    };

    let translator;

    try {
      if (!('Translator' in window)) {
        throw new Error('Translator not found');
      }
      const availability = await Translator.availability(options);
      if (availability === 'unavailable') {
        throw new Error('Translator is not available');
      }
      translator = await Translator.create({
        ...options,
        monitor(m) {
          m.addEventListener('downloadprogress', (e) => {
            console.log(`Downloaded ${e.loaded * 100}%`);
          });
        },
      });
    } catch (e) {
      console.error(e);
    }

    document.getElementById('translate-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!translator) return;
      const text = document.getElementById('source').textContent;
      const stream = translator.translateStreaming(text);
      const p = document.getElementById('translation');
      p.textContent = '';
      let translation = '';
      for await (const chunk of stream) {
        translation += chunk;
        p.append(chunk);
      }
      console.log('Translation:', translation);
    });
  </script>
</body>

</html>
