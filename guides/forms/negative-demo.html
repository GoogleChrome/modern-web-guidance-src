<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
    }
    span {
      font-size: 12px;
    }
    input {
      font-size: 12px;
      height: 20px;
      width: 150px;
      margin-bottom: 5px;
      display: block;
      border: 1px solid #000;
    }
    input:focus {
      outline: none;
    }
    .error {
      color: red;
      font-size: 10px;
      display: none;
      margin-bottom: 10px;
    }
    button {
      height: 20px;
      font-size: 12px;
      background-color: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      background-color: gray;
    }
  </style>
</head>
<body>

  <h1>Sign Up</h1>
  
  <form id="signup-form" action="/submit" method="GET">
    <span>First Name:</span>
    <input type="text" id="fname" placeholder="First Name">
    
    <span>Last Name:</span>
    <input type="text" id="lname" placeholder="Last Name">
    
    <input type="text" id="email" placeholder="Email Address">
    <div id="email-error" class="error">Invalid email address</div>
    
    <input type="number" id="pin" placeholder="Security PIN">
    <div id="pin-error" class="error">PIN must be 4 digits</div>

    <button type="button" id="submit-btn" disabled>Save changes</button>
  </form>

  <script>
    const form = document.getElementById('signup-form');
    const emailInput = document.getElementById('email');
    const pinInput = document.getElementById('pin');
    const submitBtn = document.getElementById('submit-btn');

    function updateFormState() {
      const isValidEmail = emailInput.value.indexOf('@') > 0;
      const isValidPin = pinInput.value.length === 4;
      
      if (isValidEmail && isValidPin) {
        submitBtn.disabled = false;
      } else {
        submitBtn.disabled = true;
      }
    }

    emailInput.addEventListener('input', () => {
      if (emailInput.value.indexOf('@') === -1 && emailInput.value.length > 0) {
        document.getElementById('email-error').style.display = 'block';
        emailInput.style.borderColor = 'red';
      } else {
        document.getElementById('email-error').style.display = 'none';
        emailInput.style.borderColor = '#000';
      }
      updateFormState();
    });

    pinInput.addEventListener('input', () => {
      if (pinInput.value.length !== 4 && pinInput.value.length > 0) {
        document.getElementById('pin-error').style.display = 'block';
        pinInput.style.borderColor = 'red';
      } else {
        document.getElementById('pin-error').style.display = 'none';
        pinInput.style.borderColor = '#000';
      }
      updateFormState();
    });

    submitBtn.addEventListener('click', () => {
      form.submit();
    });
  </script>
</body>
</html>
