<html>
<head>
  <title>User Registration</title>
  <style>
    body {
      font-family: "Times New Roman", serif;
      font-size: 12px;
      background-color: #fff;
      color: #333;
    }
    .main-container {
      display: flex;
      flex-wrap: wrap;
      width: 1000px;
      margin: 20px;
    }
    .column {
      width: 30%;
      padding: 10px;
    }
    .input-box {
      border: 1px solid #eee;
      padding: 4px;
      margin-bottom: 2px;
      width: 100%;
    }
    .label-text {
      display: block;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .submit-button {
      background-color: blue;
      color: white;
      padding: 5px;
      cursor: pointer;
      display: inline-block;
      width: 100px;
      text-align: center;
      margin-top: 50px;
    }
    input:focus {
      outline: none;
    }
    .hidden-field {
      display: none;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="column">
      <span class="label-text">User Information</span>
      <input type="text" class="input-box" placeholder="First Name" id="fn">
      <input type="text" class="input-box" placeholder="M.I." id="mi" style="width: 30px;">
      <input type="text" class="input-box" placeholder="Last Name" id="ln">
      
      <span class="label-text" style="margin-top: 30px;">Contact</span>
      <input type="text" class="input-box" placeholder="Email" id="em">
      <input type="number" class="input-box" placeholder="Phone Number" id="ph">
    </div>

    <div class="column">
      <span class="label-text">Account Details</span>
      <input type="password" class="input-box" placeholder="Password" id="pw" onpaste="return false;">
      
      <span class="label-text" style="margin-top: 30px;">Preferences</span>
      <div>
        <select id="gender">
          <option value="">Select Gender</option>
          <option value="m">Male</option>
          <option value="f">Female</option>
        </select>
      </div>

      <div style="margin-top: 20px;">
        <span>Select Country:</span><br>
        <input type="radio" name="c" value="us"> USA<br>
        <input type="radio" name="c" value="ca"> Canada<br>
        <input type="radio" name="c" value="uk"> UK<br>
        <input type="radio" name="c" value="au"> Australia<br>
        <input type="radio" name="c" value="de"> Germany<br>
        <input type="radio" name="c" value="fr"> France<br>
        <input type="radio" name="c" value="jp"> Japan<br>
        <input type="radio" name="c" value="in"> India<br>
        <input type="radio" name="c" value="br"> Brazil<br>
        <input type="radio" name="c" value="mx"> Mexico<br>
      </div>
    </div>

    <div class="column">
      <span class="label-text">Address</span>
      <input type="text" class="input-box" placeholder="Street" id="st">
      <input type="text" class="input-box" placeholder="Apt #" id="ap">
      <input type="text" class="input-box" placeholder="City" id="ci">
      <input type="text" class="input-box" placeholder="State" id="s">
      <input type="number" class="input-box" placeholder="ZIP Code" id="z">
      
      <span class="label-text" style="margin-top: 30px;">Payment</span>
      <input type="number" class="input-box" placeholder="Credit Card Number" id="cc">
    </div>

    <div style="width: 100%;">
      <div class="submit-button" id="subBtn" onclick="doSubmit()">Click Here</div>
    </div>
  </div>

  <script>
    function doSubmit() {
      var em = document.getElementById('em').value;
      var pw = document.getElementById('pw').value;
      
      if (em == "" || pw == "") {
        alert("FIELDS ARE EMPTY!!!!");
        return;
      }
      
      window.location.href = "/register?email=" + em + "&password=" + pw + "&fn=" + document.getElementById('fn').value;
    }

    document.getElementById('em').oninput = function() {
      if (this.value.indexOf('@') == -1) {
        alert("Invalid email while typing!");
      }
    };

    document.getElementById('subBtn').style.opacity = "0.5";
    document.getElementById('subBtn').onclick = null;

    setInterval(function() {
      var em = document.getElementById('em').value;
      var pw = document.getElementById('pw').value;
      if (em != "" && pw != "") {
        document.getElementById('subBtn').style.opacity = "1";
        document.getElementById('subBtn').onclick = doSubmit;
      } else {
        document.getElementById('subBtn').style.opacity = "0.5";
        document.getElementById('subBtn').onclick = null;
      }
    }, 500);
  </script>
</body>
</html>
