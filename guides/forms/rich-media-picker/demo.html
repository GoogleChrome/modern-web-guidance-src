<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Media Picker Demo</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --text-color: #f1f5f9;
      --primary-color: #3b82f6;
      --border-color: #334155;
      --hover-bg: #1e293b;
      --popover-bg: #0f172a;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition-speed: 0.2s;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      max-width: 600px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin: 0 0 12px 0;
      color: white;
      letter-spacing: -0.025em;
    }

    .hero p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin: 0;
      line-height: 1.6;
    }

    .picker-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #94a3b8;
    }

    /* Essential Opt-in */
    select.custom-select,
    select.custom-select::picker(select) {
      appearance: base-select;
    }

    /* Basic Structural Adjustment */
    select.custom-select {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 16px;
      background-color: #1e293b;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-color);
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition-speed) ease;
    }

    select.custom-select:hover {
      border-color: var(--primary-color);
      background-color: #334155;
    }

    select.custom-select:focus-visible {
      outline: 2px solid var(--primary-color);
      outline-offset: 2px;
    }

    select.custom-select selectedcontent {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* The arrow / carrot indicator */
    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: rotate var(--transition-speed) ease;
      color: #94a3b8;
    }

    select.custom-select:open .arrow {
      rotate: -180deg;
      color: var(--primary-color);
    }

    /* Popover List */
    select.custom-select::picker(select) {
      background-color: var(--popover-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 8px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
      margin-top: 8px;
      /* Spacing from button */
      width: anchor-size(width);
    }

    /* Option rows */
    select.custom-select option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background-color var(--transition-speed) ease;
      background-color: transparent;
    }

    /* Remove standard OS checkmark for base-select */
    select.custom-select option::before {
      display: none;
    }

    select.custom-select option:hover,
    select.custom-select option:focus-visible {
      background-color: #1e293b;
      outline: none;
    }

    select.custom-select option:active {
      background-color: #334155;
    }

    /* SVG internal structure */
    select.custom-select option svg,
    select.custom-select selectedcontent svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: var(--primary-color);
    }

    .option-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .option-title {
      font-weight: 500;
      font-size: 0.95rem;
      color: #f8fafc;
    }

    .option-desc {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    /* Show only the core name when selected (closed button state) */
    select.custom-select selectedcontent .option-desc {
      display: none;
    }

    /* Animations for popover */
    select.custom-select::picker(select) {
      transition:
        display allow-discrete 0.3s,
        overlay allow-discrete 0.3s,
        opacity 0.3s ease,
        transform 0.3s ease;
      opacity: 0;
      transform: translateY(-8px);
    }

    select.custom-select:open::picker(select) {
      opacity: 1;
      transform: translateY(0);
    }

    @starting-style {
      select.custom-select:open::picker(select) {
        opacity: 0;
        transform: translateY(-8px);
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <h1>Rich Media Picker Demo</h1>
    <p>A demonstration of the new CSS <code>appearance: base-select</code> API, allowing the native
      <code>&lt;select&gt;</code> element to be completely styled and contain rich HTML elements rather than plaintext
      options.
    </p>
  </div>

  <div class="picker-container">
    <label for="tech-stack">Select Developer Role</label>
    <select id="tech-stack" class="custom-select" name="stack">
      <button>
        <selectedcontent></selectedcontent>
      </button>
      <!-- Rich options -->
      <option value="frontend">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
        <div class="option-text">
          <span class="option-title">Frontend Developer</span>
          <span class="option-desc">React, Vue, CSS</span>
        </div>
      </option>
      <option value="backend">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
        </svg>
        <div class="option-text">
          <span class="option-title">Backend Developer</span>
          <span class="option-desc">Node.js, Python, Databases</span>
        </div>
      </option>
      <option value="design">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
          <line x1="9" y1="9" x2="9.01" y2="9"></line>
          <line x1="15" y1="9" x2="15.01" y2="9"></line>
        </svg>
        <div class="option-text">
          <span class="option-title">UX/UI Designer</span>
          <span class="option-desc">Figma, Prototyping</span>
        </div>
      </option>
      <option value="devops">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
        </svg>
        <div class="option-text">
          <span class="option-title">DevOps Engineer</span>
          <span class="option-desc">AWS, Docker, CI/CD</span>
        </div>
      </option>
    </select>
  </div>

</body>
</html>
