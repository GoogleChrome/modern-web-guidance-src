<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* Brand design system */
  :root {
    --brand-font: 'Courier New', Courier, monospace;
    --brand-bg: #fdf5e6;
    --brand-text: #8b4513;
    --brand-border: 2px dashed #8b4513;
    --brand-radius: 4px;
    --brand-spacing: 0.75rem;
    --brand-card-bg: #fffaf0;
  }

  body {
    font-family: var(--brand-font);
    background-color: var(--brand-bg);
    color: var(--brand-text);
    padding: 2rem;
  }

  .card {
    background-color: var(--brand-card-bg);
    border: var(--brand-border);
    border-radius: var(--brand-radius);
    padding: 1.5rem;
    max-width: 400px;
  }

  h1 {
    font-size: 1.5rem;
    margin-top: 0;
  }

  .brand-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: var(--brand-border);
  }

  .logo {
    width: 2.5rem;
    height: 2.5rem;
  }

  .brand-name {
    font-size: 1.5rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  button.primary {
    font-family: var(--brand-font);
    background-color: var(--brand-text);
    color: var(--brand-bg);
    border: var(--brand-border);
    border-radius: var(--brand-radius);
    padding: var(--brand-spacing) 1.5rem;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
  }

  .form-group {
    margin: 1.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  label {
    font-weight: bold;
  }

  /* Opt in to custom rendering */
  select,
  ::picker(select) {
    appearance: base-select;
  }

  /* Select element matching the brand */
  select {
    font-family: var(--brand-font);
    background-color: var(--brand-card-bg);
    color: var(--brand-text);
    border: var(--brand-border);
    border-radius: var(--brand-radius);
    padding: var(--brand-spacing);
    font-size: 1rem;
    cursor: pointer;
  }

  ::picker(select) {
    font-family: var(--brand-font);
    background-color: var(--brand-card-bg);
    color: var(--brand-text);
    border: var(--brand-border);
    border-radius: var(--brand-radius);
    padding: 0.5rem;
  }

  /* Match icons to brand text color */
  select::picker-icon {
    color: var(--brand-text);
  }

  option::checkmark {
    color: var(--brand-text);
  }

  option {
    font-family: var(--brand-font);
    padding: 0.5rem;
    border-radius: var(--brand-radius);
    color: var(--brand-text);
    cursor: pointer;
  }

  option:hover {
    background-color: var(--brand-bg);
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand-header">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="var(--brand-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
      <line x1="12" y1="22.08" x2="12" y2="12"></line>
    </svg>
    <span class="brand-name">Parcel & Co.</span>
  </div>
  <h1>Settings</h1>
  <p>Customize your profile using our standard form controls.</p>

  <div class="form-group">
    <label for="fruit">Favorite Fruit</label>
    <select id="fruit" name="fruit">
      <button>
        <selectedcontent></selectedcontent>
      </button>
      <option value="apple">Apple</option>
      <option value="banana" selected>Banana</option>
      <option value="cherry">Cherry</option>
    </select>
  </div>

  <button class="primary">Save Changes</button>
</div>

</body>
</html>
