<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Customized Form Elements Demo</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #ffffff;
        color: #333333;
      }

      .header {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
      }

      .title {
        font-size: 24px;
        margin: 0;
      }

      .form-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 300px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      input[type="checkbox"],
      input[type="radio"] {
        display: none;
      }

      .checkbox-replacement {
        width: 18px;
        height: 18px;
        border: 1px solid #e0e0e0;
        background-color: #fafafa;
        margin-right: 10px;
        cursor: pointer;
      }

      input[type="checkbox"]:checked + .checkbox-replacement {
        background-color: #f0f0f0;
      }

      .radio-replacement {
        width: 18px;
        height: 18px;
        border: 1px solid #e0e0e0;
        border-radius: 50%;
        background-color: #fafafa;
        margin-right: 10px;
        cursor: pointer;
      }

      input[type="radio"]:checked + .radio-replacement {
        background-color: #f0f0f0;
      }

      label {
        color: #666666;
        cursor: pointer;
      }

      input:focus,
      select:focus,
      textarea:focus,
      button:focus {
        outline: none;
      }

      input[type="range"] {
        width: 100%;
        height: 6px;
        background: #e0e0e0;
        border-radius: 3px;
      }

      progress {
        width: 100%;
        height: 10px;
        background-color: #e0e0e0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 class="title">Standard Form Controls</h1>
    </div>
    <p>A simple implementation of styled interactive forms for websites.</p>

    <form class="form-container">
      <div class="form-group">
        <div class="input-wrapper">
          <input type="checkbox" checked />
          <div class="checkbox-replacement"></div>
          <label>Receive regular updates</label>
        </div>
        <div class="input-wrapper">
          <input type="checkbox" />
          <div class="checkbox-replacement"></div>
          <label>I agree to the guidelines</label>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <input type="radio" name="billing" value="monthly" />
          <div class="radio-replacement"></div>
          <label>Standard Billing</label>
        </div>
        <div class="input-wrapper">
          <input type="radio" name="billing" value="yearly" checked />
          <div class="radio-replacement"></div>
          <label>Premium Billing</label>
        </div>
      </div>

      <div class="form-group">
        <label>Settings Range:</label>
        <input type="range" min="0" max="100" value="50" />
      </div>

      <div class="form-group">
        <label>Current Status:</label>
        <progress max="100" value="40"></progress>
      </div>
    </form>
  </body>
</html>
