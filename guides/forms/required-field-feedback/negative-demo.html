<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Required Field Feedback Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 4px;
    }
    input.dirty {
      border-color: #d93025;
      background-color: #fce8e6;
    }
    .error-msg {
      display: none;
      color: #d93025;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }
    input.dirty + .error-msg {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Required Field Feedback</h1>
  
  <form id="demo-form">
    <div class="form-group">
      <label for="full-name">Full Name</label>
      <input type="text" id="full-name" name="full-name" class="dirty">
      <div class="error-msg">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" class="dirty">
      <div class="error-msg">
        Username is required.
      </div>
    </div>

    <div style="display: flex; gap: 1rem;">
      <button type="button" id="submit-btn" disabled>Submit</button>
      <button type="reset">Reset</button>
    </div>
  </form>

  <script>
    const form = document.getElementById('demo-form');
    const submitBtn = document.getElementById('submit-btn');
    const inputs = form.querySelectorAll('input');

    inputs.forEach(input => {
      input.addEventListener('blur', () => {
        if (input.value === '') {
          input.classList.add('dirty');
        } else {
          input.classList.remove('dirty');
        }
        
        let isValid = true;
        inputs.forEach(inp => {
          if (inp.value === '') isValid = false;
        });
        submitBtn.disabled = !isValid;
      });
    });

    submitBtn.addEventListener('click', () => {
      form.submit();
    });
  </script>
</body>
</html>
