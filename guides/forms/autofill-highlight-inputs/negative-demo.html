<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Highlight Autofill Inputs</title>
  <style>
    div:auto-fill,
    form:auto-fill,
    input:auto-fill,
    input:-webkit-auto-fill,
    input:-webkit-auto-fill:hover,
    input:-webkit-auto-fill:focus {
      border-color: green;
      outline: none;
    }
  </style>
</head>
<body>
  <div>
    <h1>Name Form</h1>
    <form id="form" name="form">
      <section>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" maxlength="100" pattern="[\p{L} \-\.]+" required>
      </section>
      <button type="submit">Submit</button>
    </form>
  </div>
  <script>
    const inputElement = document.getElementById('name');
    setInterval(function() {
      if (inputElement && inputElement.value.length > 0) {
        inputElement.style.borderColor = 'green';
        inputElement.style.outline = 'none';
      }
    }, 250);
  </script>
</body>
</html>
