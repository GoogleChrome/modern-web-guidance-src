<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Transform Animation Demonstration</title>
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
      background-color: #f4f4f9;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .target {
      width: 100px;
      height: 100px;
      background-color: #6f42c1;
      margin: 2rem auto;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      will-change: transform;
      animation: combined-motion 4s infinite linear;
      transition: transform 0.5s ease;
    }

    .target:hover {
      transform: scale(1.3);
      animation-play-state: paused;
    }

    @keyframes combined-motion {
      0% {
        transform: translateX(-50px) rotate(0deg);
      }
      50% {
        transform: translateX(50px) rotate(180deg);
      }
      100% {
        transform: translateX(-50px) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Standard Transform Effects</h1>
    <p>Hover over the box to view the scale transition and animation behavior.</p>
    <div class="target"></div>
  </div>
</body>
</html>
