<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shared Element Transitions</title>
    <style>
      @media (prefers-reduced-motion: reduce) {
        ::view-transition-group(*),
        ::view-transition-old(*),
        ::view-transition-new(*) {
          animation: none !important;
        }
      }

      /* Dynamic `view-transition-name`s on selected item in list view */
      .thumbnail.selected {
        view-transition-name: hero;
      }
      .thumbnail.selected .title {
        view-transition-name: title;
      }

      /* Static `view-transition-name`s on detail view */
      #hero {
        view-transition-name: hero;
      }
      #title {
        view-transition-name: title;
      }

      /* Make text animation smoother */
      #list-page .title {
        width: fit-content;
      }
      #detail-page #title {
        width: fit-content;
      }

      /* Animate between different aspect ratios */
      ::view-transition-old(hero),
      ::view-transition-new(hero){
        height: 100%;
      }


      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      body #list-page,
      body.detail #detail-page {
        display: block;
      }
      body.detail #list-page,
      body #detail-page {
        display: none;
      }

      .content {
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      /* DEMO: Page states */
      #detail-page {
        display: none;
      }

      /* DEMO: List view styling (thumbnail) */
      .thumbnail {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        cursor: pointer;
        color: white;
        display: grid;
        place-items: center;
      }

      /* DEMO: Detail view styling (hero) */
      #hero {
        width: 100vw;
        height: 50vh;
        cursor: pointer;
      }

      /* DEMO: Button styling */
      button {
        padding: 8px 16px;
        font-size: 1rem;
        background: #eee;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <!-- State 1: List View -->
    <div id="list-page">
      <div class="content">
        <h1 id="list-heading" tabindex="-1">Products</h1>
        <p>Click a product thumbnail to see details.</p>

        <div class="grid">
          <button
            class="thumbnail"
            data-name="Blue Jay"
            style="background: #0066cc"
          >
            <h2 class="title">Blue Jay</h2>
          </button>
          <button
            class="thumbnail"
            data-name="Cardinal"
            style="background: #cc3333"
          >
            <h2 class="title">Cardinal</h2>
          </button>
          <button
            class="thumbnail"
            data-name="Parakeet"
            style="background: #33cc33"
          >
            <h2 class="title">Parakeet</h2>
          </button>
        </div>
      </div>
    </div>

    <!-- State 2: Detail View -->
    <div id="detail-page">
      <!-- The shared hero element, dynamically configured via JS -->
      <div id="hero" onclick="goFromDetailToList()"></div>
      <div class="content">
        <h1 id="title" tabindex="-1">Product Overview</h1>
        <p>This is the full-bleed hero view.</p>
        <button onclick="goFromDetailToList()">Back to products</button>
      </div>
    </div>

    <script>
      function goFromListToDetail(e) {
        // Prepare current view for transition
        const bgColor = getComputedStyle(e.currentTarget).backgroundColor;
        const name = e.currentTarget.dataset.name;
        // Apply class that applies view-transition-names to selected item
        e.currentTarget.classList.add("selected");

        // Replace the content on the detail page
        const hero = document.getElementById("hero");
        hero.style.background = bgColor;

        const title = document.getElementById("title");
        title.innerText = name;

        if (!document.startViewTransition) {
          document.body.classList.add("detail");
          document.getElementById("title")?.focus();
          return;
        }
        const transition = document.startViewTransition(() =>
          document.body.classList.add("detail"),
        );
        transition.finished.finally(() => {
          document.getElementById("title")?.focus();
        });
      }

      document.querySelectorAll(".thumbnail").forEach((thumbnail) => {
        thumbnail.addEventListener("click", goFromListToDetail);
      });

      function goFromDetailToList() {
        if (!document.startViewTransition) {
          document.body.classList.remove("detail");
          document.getElementById("list-heading")?.focus();
          return;
        }
        const transition = document.startViewTransition(() => {
          document.body.classList.remove("detail");
        });
        transition.finished.finally(() => {
          document.getElementById("list-heading")?.focus();
          // Remove selected classList to remove view-transition-names
          document.querySelectorAll(".selected").forEach(
            (element) => {
              element.classList.remove("selected");
            },
          );
        });
      }
    </script>
  </body>
</html>
