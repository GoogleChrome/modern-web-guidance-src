<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculate Total Foreground Time</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .stat {
      font-size: 2.5rem;
      font-weight: bold;
      color: #0056b3;
      margin: 1rem 0;
    }
    .note {
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Foreground Time Tracker</h1>
  <p class="note">This page tracks how long you actively view it. Switch tabs and come back to see that background time is explicitly excluded from the total.</p>
  
  <div>
    <p>Total Foreground Time:</p>
    <div id="foreground-time" class="stat">0.0s</div>
  </div>

  <script>
    let totalForegroundTime = 0;
    let lastVisibleTime = performance.now();

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        totalForegroundTime += performance.now() - lastVisibleTime;
      } else {
        lastVisibleTime = performance.now();
      }
    });

    function getTotalForegroundTime() {
      if (document.visibilityState === 'visible') {
        return totalForegroundTime + (performance.now() - lastVisibleTime);
      }
      return totalForegroundTime;
    }

    setInterval(() => {
      const ms = getTotalForegroundTime();
      document.getElementById('foreground-time').textContent = (ms / 1000).toFixed(1) + 's';
    }, 100);
  </script>
</body>
</html>
