<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Negative Demo: Calculate Total Foreground Time</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
    .card { border: 1px solid #ccc; padding: 2rem; border-radius: 8px; }
    .value { font-family: monospace; font-size: 1.25rem; color: #e11d48; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Total Foreground Time (Incorrect)</h1>
    <p>This demo is an anti-example. It uses <code>performance.now()</code> for the total time without considering visibility states or using the <code>VisibilityStateEntry</code> API.</p>
    
    <div>
      <strong>Reported Time:</strong>
      <span id="foreground-time" class="value">0ms</span>
    </div>
  </div>

  <script>
    /**
     * INCORRECT: Does not use VisibilityStateEntry API.
     * This implementation ignores whether the page is in the foreground or background.
     */
    function getTotalForegroundTime() {
      // Failure: Just returns total elapsed time.
      return performance.now();
    }

    setInterval(() => {
      document.getElementById('foreground-time').textContent = `${Math.round(getTotalForegroundTime())}ms`;
    }, 100);
  </script>
</body>
</html>
