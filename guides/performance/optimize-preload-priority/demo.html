<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Optimize Preload Priority Demo</title>

  <!-- 
    1. Video Poster (High Priority)
  -->
  <link rel="preload" as="image" href="poster.jpg" fetchpriority="high">

  <!-- 
    2. Critical Web Font (High Priority)
  -->
  <link rel="preload" as="font" type="font/woff2" href="brand-font.woff2" crossorigin fetchpriority="high">

  <!-- 
    3. Heavy Script (Low Priority)
  -->
  <link rel="preload" as="script" href="background-init.js" fetchpriority="low">

</head>

<body>
  <h1>Video Landing Page</h1>
  <video poster="poster.jpg" width="800" height="450" controls preload="none">
    <source src="example-video.webm" type="video/webm">
  </video>

</body>

</html>
