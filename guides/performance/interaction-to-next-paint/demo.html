<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaction to Next Paint (INP) Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-right: 0.5rem; }
        .log { background: #f8f9fa; padding: 1rem; border-radius: 4px; border: 1px solid #ddd; height: 200px; overflow-y: scroll; font-family: monospace; }
        .inp-container { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
        .inp-value { font-size: 2rem; color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Interaction to Next Paint (INP)</h1>
        <p>Interact with the buttons below. This demo calculates INP by grouping events by <code>interactionId</code> and tracking the maximum duration.</p>
        <button onclick="block(50)">Medium (50ms)</button>
        <button onclick="block(200)">Slow (200ms)</button>
        
        <div class="inp-container">
            <div id="inp" class="inp-value">0ms</div>
            <p>Current INP (Worst Interaction)</p>
        </div>
    </div>

    <div class="log" id="log">Logs appear here...</div>

    <script>
        const logEl = document.getElementById('log');
        const inpEl = document.getElementById('inp');
        
        // Map to store the maximum duration for each unique interactionId
        const interactionDurations = new Map();
        let maxInp = 0;

        function block(ms) {
            const start = performance.now();
            while (performance.now() - start < ms) {}
        }

        const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
                if (entry.interactionId) {
                    // An interaction (e.g., a click) can trigger multiple events (pointerdown, pointerup, click)
                    // all sharing the same interactionId. The interaction's duration is the longest of these.
                    const currentMax = interactionDurations.get(entry.interactionId) || 0;
                    const interactionDuration = Math.max(currentMax, entry.duration);
                    interactionDurations.set(entry.interactionId, interactionDuration);

                    // Update global INP (worst interaction observed so far)
                    if (interactionDuration > maxInp) {
                        maxInp = interactionDuration;
                        inpEl.textContent = `${maxInp}ms`;
                    }
                    
                    const msg = `[ID: ${entry.interactionId}] ${entry.name} - Duration: ${entry.duration}ms\n`;
                    logEl.innerText = msg + logEl.innerText;
                }
            }
        });

        // durationThreshold: 16 is used to capture interactions that might be fast but still contribute to INP
        observer.observe({ type: 'event', buffered: true, durationThreshold: 16 });
    </script>
</body>
</html>
