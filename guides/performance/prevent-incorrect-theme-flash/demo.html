<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prevent Incorrect Theme Flash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- The meta tag is crucial to prevent the flash before CSS loads -->
  <meta name="color-scheme" content="light dark">
  <style>
    :root {
      /* The color-scheme property lets the browser know what color schemes this page supports */
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <h1>Color Scheme Demo</h1>
  <p>If your system is in dark mode, this page will render with a dark background immediately, avoiding a "flash of white" while loading.</p>
</body>
</html>
