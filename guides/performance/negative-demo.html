<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Negative Demo</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Roboto&display=swap");
    
    .hero-container {
      background-color: #eee;
    }
    
    .content-section {
      padding: 50px;
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    function blockMainThread() {
      const start = Date.now();
      while (Date.now() - start < 1000) {
        Math.sqrt(Math.random());
      }
    }
    blockMainThread();

    function causeLayoutThrashing() {
      const elements = document.querySelectorAll('div');
      for (let i = 0; i < elements.length; i++) {
        const width = elements[i].offsetWidth;
        elements[i].style.height = (width / 2) + 'px';
      }
    }
    window.onload = causeLayoutThrashing;
  </script>
</head>
<body>
  <div class="hero-container">
    <h1>Welcome to our site</h1>
    <img src="https://picsum.photos/1200/800" alt="Hero Image" loading="lazy">
  </div>

  <div class="content-section">
    <h2>Our Features</h2>
    <p>Check out our latest video:</p>
    <video autoplay muted loop>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <p>More information below:</p>
    <img src="https://picsum.photos/400/400?random=2" alt="Feature Image">
    <img src="https://picsum.photos/400/400?random=3" alt="Another Image">
  </div>

  <script>
    const largeArray = new Array(1000000).fill(0);
    largeArray.forEach((_, i) => {
      Math.sin(i);
    });
  </script>
</body>
</html>
