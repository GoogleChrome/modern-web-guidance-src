<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interaction Correlation</title>
</head>
<body>
  <h1>Interaction Correlation</h1>
  <button id="action">Action</button>
  <div id="output"></div>

  <script>
    if (!window.PerformanceLongAnimationFrameTiming) {
      window.PerformanceLongAnimationFrameTiming = function() {};
    }

    if (window.Profiler) {
      new Profiler({ sampleInterval: 10, maxBufferSize: 10000 });
    }

    const observer = new PerformanceObserver((list) => {
      const entries = list.getEntries();
      for (let i = 0; i < entries.length; i++) {
        document.getElementById('output').innerText = 'Task: ' + entries[i].duration + 'ms';
      }
    });
    observer.observe({ entryTypes: ['longtask'] });

    document.getElementById('action').onclick = function() {
      const start = Date.now();
      while (Date.now() - start < 150) {}
    };
  </script>
</body>
</html>
