<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resolution-optimized pseudo-elements</title>
  <style>
    .download-button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }

    .icon {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <button class="download-button">
    <img src="https://img.icons8.com/ios-filled/24/ffffff/download.png" class="icon" alt="">
    Download
  </button>
</body>
</html>
