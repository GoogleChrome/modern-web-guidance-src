<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Measure Total Frame Delay Demo</title>
</head>
<body>
  <h1>Measure Total Frame Delay</h1>
  <button id="many-tasks-button">Trigger Many Small Tasks</button>

  <script>
    // Observe long animation frames
    const observer = new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        console.log(`Long frame duration: ${entry.duration}ms`);
        console.log(`Total scripts executed: ${entry.scripts.length}`);
        
        // Even if no single script was >50ms, the combined frame might be long.
        // The Long Tasks API would not catch this, but LoAF does.
        const totalScriptTime = entry.scripts.reduce((total, script) => total + script.duration, 0);
        // Console log for now, but in a real application would want to beacon
        // back to an anlytics endpoint
        console.log(`Combined script time: ${totalScriptTime}ms`);
      }
    });

    observer.observe({ type: 'long-animation-frame', buffered: true });

    document.getElementById('many-tasks-button').addEventListener('click', () => {
      // Execute 10 small microtasks (15ms each).
      // None trigger a long task individually, but combined they delay the frame by 150ms+.
      for (let i = 0; i < 10; i++) {
        queueMicrotask(() => {
          const start = performance.now();
          while (performance.now() - start < 15) {
            // block main thread for 15ms
          }
        });
      }
    });
  </script>
</body>
</html>
