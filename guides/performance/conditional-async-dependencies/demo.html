<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conditional Async Dependencies</title>
</head>
<body>
  <p id="status">Loading application dependencies...</p>

  <script type="module">
    if (!('interestForElement' in HTMLButtonElement.prototype)) {
      await import('https://unpkg.com/interestfor/src/interestfor.min.js');
    }

    // The dependency is guaranteed to be loaded and evaluated from this line onward
    document.getElementById('status').textContent = 'Initialization complete. Feature is ready to use.';
  </script>
</body>
</html>
