<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avoid JS Style Calculators with @function</title>
    <style>
        /* 1. Conditional Layout/Spacing Function */
        @function --adaptive-padding(--base) {
            result: var(--base); /* Default mobile size */
            
            @media (min-width: 768px) {
                result: calc(var(--base) * 2);
            }
            @media (min-width: 1200px) {
                result: calc(var(--base) * 4);
            }
        }

        /* 2. State-Driven Color Calculator (Generalization) */
        @function --hover-color(--bg, --mix-amount) {
            result: color-mix(in srgb, var(--bg) var(--mix-amount), white);
        }

        :root {
            --primary-bg: #1e1b4b; /* Indigo 950 */
            --card-bg: #1e293b; /* Slate 800 */
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--primary-bg);
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            /* Adaptive padding without JS window.onresize */
            padding: --adaptive-padding(16px); 
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            transition: background 0.2s ease;
        }

        .container:hover {
            /* Dynamic hover without JS onmouseover */
            background: --hover-color(var(--card-bg), 90%);
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: --adaptive-padding(24px); /* Scales with media query inside function */
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zero-JS Native Logic</h1>
        <p>This container adapts its padding and heading size using a custom <code>@function</code> with nested <code>@media</code> queries.</p>
        <p>Hovering this card calculates a dynamic hover color using <code>color-mix()</code> inside a function, avoiding JavaScript event updates.</p>
        <a href="#" class="btn">Learn More</a>
    </div>
</body>
</html>
