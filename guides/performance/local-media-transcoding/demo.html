<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCodecs: High-Performance Local Transcoding</title>
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --error: #dc2626;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
    }
    section {
      background: var(--card);
      padding: 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .video-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    video, canvas {
      background: #000;
      width: 100%;
      border-radius: 0.5rem;
      aspect-ratio: 16 / 9;
    }
    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    #stop-btn { background-color: var(--error); }
    
    .log-container {
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 0.5rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.825rem;
      max-height: 250px;
      overflow-y: auto;
    }
    .status-panel {
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .status-supported { background: #dcfce7; color: #166534; }
    .status-unsupported { background: #fee2e2; color: #991b1b; }
    .status-encoding { background: #dbeafe; color: #1e40af; }

    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <header>
    <h1>Share Your Brew: Local Recorder</h1>
    <p>Capture and encode high-quality video directly in your browser. Using <strong>WebCodecs</strong> ensures your data stays private and your UI stays responsive.</p>
  </header>

  <main>
    <section>
      <div id="support-status" class="status-panel status-unsupported">
        Checking WebCodecs support...
      </div>

      <div class="video-container">
        <div>
          <label>Camera Preview</label>
          <video id="preview" class="test-video-source" autoplay muted playsinline></video>
        </div>
        <div>
          <label>Processing Buffer</label>
          <canvas id="proc-canvas" width="640" height="360"></canvas>
        </div>
      </div>

      <div class="controls">
        <button id="start-btn" class="test-start-btn" disabled>Start 5s Recording</button>
        <button id="stop-btn" style="display:none">Stop Early</button>
        <div id="encoding-status" class="test-output-info">Status: Ready</div>
      </div>

      <div id="progress-container" style="display:none">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>
    </section>

    <section>
      <h3>Encoding Statistics</h3>
      <div id="log" class="log-container test-output-log">
        Initializing system...
      </div>
    </section>
  </main>

  <script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('proc-canvas');
    const log = document.getElementById('log');
    const statusText = document.getElementById('encoding-status');
    const supportStatus = document.getElementById('support-status');
    const progressFill = document.getElementById('progress-fill');
    const progressContainer = document.getElementById('progress-container');
    const ctx = canvas.getContext('2d', { alpha: false });

    let encoder = null;
    let stream = null;
    let frameCounter = 0;
    let isRecording = false;
    let recordingStartTime = 0;
    const RECORDING_DURATION_MS = 5000;
    const FRAME_RATE = 30;

    // 1. Robust Feature Detection
    async function checkSupport() {
      if (!('VideoEncoder' in window)) {
        supportStatus.textContent = 'WebCodecs API not found in this browser.';
        supportStatus.className = 'status-panel status-unsupported';
        return false;
      }

      const config = {
        codec: 'vp09.00.10.08', // VP9 Profile 0, Level 1.0, 8-bit
        width: 640,
        height: 360,
        bitrate: 2_000_000,
        framerate: FRAME_RATE,
      };

      try {
        const support = await VideoEncoder.isConfigSupported(config);
        if (support.supported) {
          supportStatus.textContent = 'Hardware Acceleration Available';
          supportStatus.className = 'status-panel status-supported';
          startBtn.disabled = false;
          addLog('System ready: VP9 Hardware Encoding supported.');
          return true;
        } else {
          // Fallback to VP8 if VP9 isn't supported
          config.codec = 'vp8';
          const vp8Support = await VideoEncoder.isConfigSupported(config);
          if (vp8Support.supported) {
             supportStatus.textContent = 'WebCodecs Supported (VP8 Fallback)';
             supportStatus.className = 'status-panel status-supported';
             startBtn.disabled = false;
             return true;
          }
          throw new Error('No supported hardware codecs found.');
        }
      } catch (e) {
        supportStatus.textContent = 'WebCodecs Error: ' + e.message;
        supportStatus.className = 'status-panel status-unsupported';
        return false;
      }
    }

    function addLog(message) {
      const entry = document.createElement('div');
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.prepend(entry);
    }

    // 2. Initialize Camera
    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 640, height: 360, frameRate: FRAME_RATE },
          audio: false 
        });
        preview.srcObject = stream;
        await preview.play();
        addLog('Camera stream initialized.');
      } catch (e) {
        addLog('Camera Error: ' + e.message);
        supportStatus.textContent = 'Camera Access Denied';
        supportStatus.className = 'status-panel status-unsupported';
      }
    }

    // 3. Main Encoding Logic
    async function startRecording() {
      if (isRecording) return;
      
      const config = {
        codec: 'vp09.00.10.08',
        width: 640,
        height: 360,
        bitrate: 2_000_000,
        framerate: FRAME_RATE,
      };

      // Check support again for the specific config
      const support = await VideoEncoder.isConfigSupported(config);
      const activeConfig = support.supported ? config : { ...config, codec: 'vp8' };

      encoder = new VideoEncoder({
        output: (chunk, metadata) => {
          // In a real app, you'd mux this into a file or stream it
          addLog(`Chunk encoded: ${chunk.type}, ${chunk.byteLength} bytes, ts: ${chunk.timestamp}`);
        },
        error: (e) => {
          addLog('Encoder Error: ' + e.message);
          stopRecording();
        }
      });

      encoder.configure(activeConfig);
      
      isRecording = true;
      frameCounter = 0;
      recordingStartTime = performance.now();
      
      startBtn.disabled = true;
      stopBtn.style.display = 'inline-block';
      progressContainer.style.display = 'block';
      statusText.textContent = 'Status: Recording...';
      
      requestAnimationFrame(processFrame);
    }

    async function processFrame(now) {
      if (!isRecording) return;

      const elapsed = now - recordingStartTime;
      const progress = Math.min(elapsed / RECORDING_DURATION_MS, 1);
      progressFill.style.width = (progress * 100) + '%';

      if (elapsed >= RECORDING_DURATION_MS) {
        stopRecording();
        return;
      }

      // Capture frame from video to canvas to ensure consistent sizing
      ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);

      // Create VideoFrame - MANDATORY for WebCodecs
      // Note: We use microseconds for the timestamp
      const timestamp = Math.round(frameCounter * (1_000_000 / FRAME_RATE));
      const frame = new VideoFrame(canvas, { timestamp });

      // Request a keyframe every 2 seconds
      const keyFrame = frameCounter % (FRAME_RATE * 2) === 0;
      
      try {
        encoder.encode(frame, { keyFrame });
        // MANDATORY: Close frame immediately to prevent memory leaks
        frame.close();
        frameCounter++;
      } catch (e) {
        addLog('Encoding Error: ' + e.message);
        stopRecording();
        return;
      }

      requestAnimationFrame(processFrame);
    }

    async function stopRecording() {
      if (!isRecording) return;
      isRecording = false;
      
      statusText.textContent = 'Status: Finishing...';
      addLog('Flushing encoder...');
      
      if (encoder) {
        try {
          await encoder.flush();
          addLog('All frames processed successfully.');
          encoder.close();
          encoder = null;
        } catch (e) {
          addLog('Flush Error: ' + e.message);
        }
      }

      startBtn.disabled = false;
      stopBtn.style.display = 'none';
      statusText.textContent = 'Status: Complete';
      addLog('Recording complete. Metadata and chunks ready for local use.');
    }

    startBtn.addEventListener('click', startRecording);
    stopBtn.addEventListener('click', stopRecording);

    // Bootstrap
    checkSupport().then(supported => {
      if (supported) initCamera();
    });
  </script>
</body>
</html>
