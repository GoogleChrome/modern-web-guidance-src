<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Error Announcement Demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .hint {
      display: block;
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 4px;
    }

    input:invalid {
      border-color: #d93025;
      background-color: #fce8e6;
    }

    input:valid {
      border-color: #188038;
    }

    .error-message {
      display: none;
      color: #d93025;
      margin-top: 0.5rem;
      font-weight: bold;
    }

    input:invalid + .error-message {
      display: block;
    }

    .debug-info {
      margin-top: 0.5rem;
      font-family: monospace;
      font-size: 0.8rem;
      color: #0056b3;
      background: #e8f0fe;
      padding: 4px;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <h1>Accessible Error Announcement</h1>
  <p>This demo synchronizes the visual state with the semantic attributes.</p>

  <form id="demo-form" action="#" onsubmit="event.preventDefault();">

    <div class="form-group">
      <label for="username">Username (Required, min 3 chars)</label>
      <span class="hint" id="username-hint">Type 1-2 chars and tab away to see error.</span>
      <input type="text" id="username" name="username" required minlength="3" aria-invalid="true">
      <div id="username-error" class="error-message">
        Username must be at least 3 characters long.
      </div>
      <div class="debug-info" id="username-debug">aria-invalid: true</div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required aria-invalid="true">
      <div id="email-error" class="error-message">
        Please enter a valid email address.
      </div>
      <div class="debug-info" id="email-debug">aria-invalid: true</div>
    </div>

    <div style="display: flex; gap: 1rem;">
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </div>
  </form>

  <script>
    const updateDebugInfo = (input) => {
      const debugEl = document.getElementById(`${input.id}-debug`);
      if (debugEl) {
        debugEl.textContent = `aria-invalid: ${input.getAttribute('aria-invalid') || 'null'}`;
      }
    };

    document.addEventListener('blur', (e) => {
      if (!e.target.matches('input, textarea, select')) return;
      
      if (!e.target.checkValidity()) {
        e.target.setAttribute('aria-invalid', 'true');
      } else {
        e.target.removeAttribute('aria-invalid');
      }
      
      updateDebugInfo(e.target);
    });

    document.addEventListener('focus', (e) => {
      if (!e.target.matches('input, textarea, select')) return;

      e.target.setAttribute('aria-invalid', 'true');
      updateDebugInfo(e.target);
    });
  </script>
</body>

</html>
